<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Dashboard — Neural NeXus</title>
<link rel="icon" href="/img/neuron-logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06060b;
  --surface: rgba(255,255,255,0.03);
  --surface-2: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --border-2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --text-dim: rgba(255,255,255,0.4);
  --text-mid: rgba(255,255,255,0.6);
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.3);
  --green: #22c55e;
  --amber: #f59e0b;
  --red: #ef4444;
  --complete: #6b7280;
  --radius: 12px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

a { color: var(--gold); text-decoration: none; }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 16px;
}
.header h1 {
  font-size: 28px;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: -0.5px;
}
.header .meta {
  font-size: 13px;
  color: var(--text-dim);
}
.header .meta span { color: var(--text-mid); }

/* Summary stats */
.summary-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 36px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  text-align: center;
}
.stat-card .num {
  font-size: 32px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}
.stat-card .num.green { color: var(--green); }
.stat-card .num.amber { color: var(--amber); }
.stat-card .num.red { color: var(--red); }
.stat-card .label {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Section headers */
.section-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 16px;
  margin-top: 40px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--gold-dim);
}

/* Program cards */
.programs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.program-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.program-card:hover {
  border-color: var(--border-2);
  background: var(--surface-2);
}
.program-card .pc-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.program-card .pc-header h3 {
  font-size: 16px;
  font-weight: 700;
  flex: 1;
}
.program-card .pc-desc {
  font-size: 13px;
  color: var(--text-mid);
  margin-bottom: 12px;
}
.program-card .pc-metrics {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}
.metric-tag {
  font-size: 11px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px 8px;
  color: var(--text-mid);
}
.program-card .pc-projects {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.project-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text-mid);
  background: var(--surface-2);
  border-radius: 20px;
  padding: 3px 10px;
}

/* Status dot */
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.dot.green { background: var(--green); }
.dot.amber { background: var(--amber); }
.dot.red { background: var(--red); }
.dot.complete { background: var(--complete); position: relative; }
.dot.complete::after {
  content: '✓';
  position: absolute;
  top: -3px;
  left: 1px;
  font-size: 7px;
  color: #fff;
  font-weight: 700;
}
.dot-lg {
  width: 10px;
  height: 10px;
}

/* Project cards */
.project-group {
  margin-top: 24px;
}
.project-group-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-mid);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
}
.project-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.project-header:hover { background: var(--surface-2); }
.project-header .chevron {
  font-size: 12px;
  color: var(--text-dim);
  transition: transform 0.2s;
  width: 16px;
  text-align: center;
}
.project-header .chevron.open { transform: rotate(90deg); }
.project-header h4 {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
}
.project-header .badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.badge-active { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-in-progress { background: rgba(245,158,11,0.15); color: var(--amber); }
.badge-blocked { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-complete { background: rgba(107,114,128,0.15); color: var(--complete); }
.badge-in-development { background: rgba(245,158,11,0.15); color: var(--amber); }

.task-count {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: 4px;
}
.blocker-count {
  font-size: 11px;
  color: var(--red);
  margin-left: 4px;
  font-weight: 600;
}

.project-body {
  display: none;
  padding: 0 18px 16px;
  border-top: 1px solid var(--border);
}
.project-body.open { display: block; }
.project-charter {
  font-size: 13px;
  color: var(--text-mid);
  margin: 12px 0;
  line-height: 1.6;
}
.project-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.project-meta strong { color: var(--text-mid); }
.agent-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  background: var(--gold-dim);
  color: var(--gold);
  border-radius: 6px;
  padding: 2px 8px;
  font-weight: 600;
  text-transform: capitalize;
}

/* Tasks in project */
.task-list { margin-top: 8px; }
.task-item {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 10px;
  align-items: start;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.task-item:last-child { border-bottom: none; }
.task-desc { color: var(--text); }
.task-desc.complete-task { color: var(--text-dim); text-decoration: line-through; }
.task-assignee {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}
.task-priority {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 4px;
  white-space: nowrap;
}
.priority-P0 { background: rgba(239,68,68,0.2); color: var(--red); }
.priority-P1 { background: rgba(245,158,11,0.2); color: var(--amber); }
.priority-P2 { background: rgba(107,114,128,0.2); color: var(--complete); }
.task-blocker {
  font-size: 12px;
  color: var(--red);
  margin-top: 2px;
  grid-column: 2 / -1;
  padding-left: 0;
}

/* All tasks section */
.tasks-section .task-group-title {
  font-size: 14px;
  font-weight: 600;
  margin-top: 20px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tasks-section .task-group-title .count {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-dim);
}
.flat-task {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  gap: 10px;
  align-items: center;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 4px;
  font-size: 13px;
}
.flat-task .ft-project {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}
.flat-task .ft-blocker {
  grid-column: 2 / -1;
  font-size: 12px;
  color: var(--red);
}

/* Agent table */
.agent-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.agent-table th {
  text-align: left;
  padding: 10px 12px;
  color: var(--text-dim);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border-2);
}
.agent-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-mid);
}
.agent-table .agent-name {
  color: var(--text);
  font-weight: 600;
  text-transform: capitalize;
}
.agent-table .division-tag {
  font-size: 11px;
  background: var(--surface-2);
  border-radius: 6px;
  padding: 2px 8px;
}

/* Loading / Error */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
  font-size: 16px;
}
.error {
  text-align: center;
  padding: 40px;
  color: var(--red);
  font-size: 14px;
}

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 16px 12px 60px; }
  .header h1 { font-size: 22px; }
  .summary-bar { grid-template-columns: repeat(2, 1fr); }
  .programs-grid { grid-template-columns: 1fr; }
  .flat-task { grid-template-columns: auto 1fr auto; }
  .flat-task .ft-project { display: none; }
  .stat-card .num { font-size: 26px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Project Management</h1>
    <div class="meta">Last updated <span id="lastUpdated">—</span> by <span id="updatedBy">—</span></div>
  </div>

  <div id="app">
    <div class="loading">Loading dashboard…</div>
  </div>
</div>

<script>
(function() {
  const $ = (s, p) => (p || document).querySelector(s);
  const $$ = (s, p) => [...(p || document).querySelectorAll(s)];

  const STATUS_MAP = {
    'active': { label: 'Active', cls: 'green', badge: 'badge-active' },
    'in-progress': { label: 'In Progress', cls: 'amber', badge: 'badge-in-progress' },
    'in-development': { label: 'In Dev', cls: 'amber', badge: 'badge-in-development' },
    'blocked': { label: 'Blocked', cls: 'red', badge: 'badge-blocked' },
    'complete': { label: 'Complete', cls: 'complete', badge: 'badge-complete' },
    'open': { label: 'Open', cls: 'amber', badge: 'badge-in-progress' }
  };

  function statusInfo(s) { return STATUS_MAP[s] || STATUS_MAP['active']; }
  function dot(status, large) {
    const info = statusInfo(status);
    return `<span class="dot ${info.cls}${large ? ' dot-lg' : ''}"></span>`;
  }
  function badge(status) {
    const info = statusInfo(status);
    return `<span class="badge ${info.badge}">${info.label}</span>`;
  }
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }
  function fmtDate(d) {
    if (!d) return '—';
    try {
      const dt = new Date(d);
      return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch(e) { return d; }
  }
  function fmtDateTime(d) {
    if (!d) return '—';
    try {
      const dt = new Date(d);
      return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
    } catch(e) { return d; }
  }

  // Gather all tasks across all programs/projects
  function allTasks(data) {
    const tasks = [];
    for (const prog of data.programs) {
      for (const proj of prog.projects) {
        for (const task of (proj.tasks || [])) {
          tasks.push({ ...task, projectName: proj.name, programName: prog.name });
        }
      }
    }
    return tasks;
  }

  function computeStats(data) {
    const tasks = allTasks(data);
    const activeProjects = data.programs.reduce((n, p) => n + p.projects.filter(pr => pr.status !== 'complete').length, 0);
    const openTasks = tasks.filter(t => t.status === 'open' || t.status === 'in-progress').length;
    const blockedTasks = tasks.filter(t => t.status === 'blocked' || (t.blocker && t.status !== 'complete')).length;
    return {
      programs: data.programs.length,
      activeProjects,
      openTasks,
      blockedTasks
    };
  }

  function renderSummary(stats) {
    return `
      <div class="summary-bar">
        <div class="stat-card"><div class="num">${stats.programs}</div><div class="label">Programs</div></div>
        <div class="stat-card"><div class="num green">${stats.activeProjects}</div><div class="label">Active Projects</div></div>
        <div class="stat-card"><div class="num amber">${stats.openTasks}</div><div class="label">Open Tasks</div></div>
        <div class="stat-card"><div class="num red">${stats.blockedTasks}</div><div class="label">Blocked</div></div>
      </div>`;
  }

  function renderProgramCards(data) {
    return `
      <div class="section-title">Programs</div>
      <div class="programs-grid">
        ${data.programs.map(p => {
          const info = statusInfo(p.status);
          const metrics = p.metrics ? Object.entries(p.metrics).map(([k,v]) => `<span class="metric-tag">${esc(String(v))}</span>`).join('') : '';
          const pills = p.projects.map(pr => {
            const pi = statusInfo(pr.status);
            return `<span class="project-pill">${dot(pr.status)} ${esc(pr.name)}</span>`;
          }).join('');
          return `
            <div class="program-card" data-program="${p.id}">
              <div class="pc-header">
                ${dot(p.status, true)}
                <h3>${esc(p.name)}</h3>
              </div>
              <div class="pc-desc">${esc(p.description)}</div>
              ${metrics ? `<div class="pc-metrics">${metrics}</div>` : ''}
              <div class="pc-projects">${pills}</div>
            </div>`;
        }).join('')}
      </div>`;
  }

  function renderProjectTask(task) {
    const isComplete = task.status === 'complete';
    const isBlocked = task.status === 'blocked' || (task.blocker && task.status !== 'complete');
    return `
      <div class="task-item">
        ${dot(task.status)}
        <div class="task-desc${isComplete ? ' complete-task' : ''}">${esc(task.description)}</div>
        <span class="task-priority priority-${task.priority}">${task.priority}</span>
        <span class="task-assignee">${esc(task.assignee)}</span>
        ${isBlocked && task.blocker ? `<div class="task-blocker">⚠ ${esc(task.blocker)}</div>` : ''}
      </div>`;
  }

  function renderProjects(data) {
    return data.programs.map(prog => {
      const projects = prog.projects.map(proj => {
        const taskCount = (proj.tasks || []).filter(t => t.status !== 'complete').length;
        const blockerCount = (proj.tasks || []).filter(t => t.status === 'blocked' || (t.blocker && t.status !== 'complete')).length;
        const tasksHtml = (proj.tasks || []).length > 0
          ? `<div class="task-list">${(proj.tasks || []).map(renderProjectTask).join('')}</div>`
          : '<div style="font-size:12px;color:var(--text-dim);margin-top:8px;">No tasks</div>';

        return `
          <div class="project-card" id="project-${proj.id}">
            <div class="project-header" onclick="toggleProject(this)">
              <span class="chevron">▶</span>
              ${dot(proj.status)}
              <h4>${esc(proj.name)}</h4>
              ${badge(proj.status)}
              ${taskCount > 0 ? `<span class="task-count">${taskCount} task${taskCount !== 1 ? 's' : ''}</span>` : ''}
              ${blockerCount > 0 ? `<span class="blocker-count">${blockerCount} blocked</span>` : ''}
            </div>
            <div class="project-body">
              <div class="project-charter">${esc(proj.charter)}</div>
              <div class="project-meta">
                <span><strong>Started:</strong> ${fmtDate(proj.started)}</span>
                <span><strong>Updated:</strong> ${fmtDate(proj.lastUpdated)}</span>
                ${proj.completedDate ? `<span><strong>Completed:</strong> ${fmtDate(proj.completedDate)}</span>` : ''}
                <span><strong>Agents:</strong> ${(proj.agents || []).map(a => `<span class="agent-tag">${esc(a)}</span>`).join(' ')}</span>
              </div>
              ${tasksHtml}
            </div>
          </div>`;
      }).join('');

      return `
        <div class="project-group" id="program-${prog.id}">
          <div class="project-group-title">${dot(prog.status, true)} ${esc(prog.name)}</div>
          ${projects}
        </div>`;
    }).join('');
  }

  function renderAllTasks(data) {
    const tasks = allTasks(data);
    const groups = {
      'in-progress': { title: 'In Progress', color: 'var(--amber)', items: [] },
      'blocked': { title: 'Blocked', color: 'var(--red)', items: [] },
      'open': { title: 'Open', color: 'var(--text-mid)', items: [] },
      'complete': { title: 'Recently Completed', color: 'var(--complete)', items: [] }
    };

    for (const t of tasks) {
      if (t.status === 'in-progress') groups['in-progress'].items.push(t);
      else if (t.status === 'blocked') groups['blocked'].items.push(t);
      else if (t.status === 'open') groups['open'].items.push(t);
      else if (t.status === 'complete') groups['complete'].items.push(t);
    }

    // Also add tasks with blockers that aren't formally "blocked"
    for (const t of tasks) {
      if (t.blocker && t.status === 'open') {
        const idx = groups['open'].items.indexOf(t);
        if (idx > -1) groups['open'].items.splice(idx, 1);
        groups['blocked'].items.push(t);
      }
    }

    let html = '<div class="tasks-section">';
    for (const [key, group] of Object.entries(groups)) {
      if (group.items.length === 0) continue;
      html += `<div class="task-group-title" style="color:${group.color}">${group.title} <span class="count">(${group.items.length})</span></div>`;
      for (const t of group.items) {
        const isComplete = t.status === 'complete';
        const isBlocked = t.status === 'blocked' || (t.blocker && t.status !== 'complete');
        html += `
          <div class="flat-task">
            ${dot(t.status)}
            <div class="task-desc${isComplete ? ' complete-task' : ''}">${esc(t.description)}</div>
            <span class="ft-project">${esc(t.projectName)}</span>
            <span class="task-priority priority-${t.priority}">${t.priority}</span>
            <span class="task-assignee">${esc(t.assignee)}</span>
            ${isBlocked && t.blocker ? `<div class="ft-blocker">⚠ ${esc(t.blocker)}</div>` : ''}
          </div>`;
      }
    }
    html += '</div>';
    return html;
  }

  function renderAgents(data) {
    const tasks = allTasks(data);
    const rows = (data.agents || []).map(agent => {
      const agentTasks = tasks.filter(t => t.assignee === agent.id || t.assignee === agent.name);
      const activeTasks = agentTasks.filter(t => t.status === 'in-progress' || t.status === 'open');
      const completedTasks = agentTasks.filter(t => t.status === 'complete');
      return `
        <tr>
          <td class="agent-name">${esc(agent.name)}</td>
          <td>${esc(agent.role)}</td>
          <td><span class="division-tag">${esc(agent.division)}</span></td>
          <td>${esc(agent.model)}</td>
          <td>${activeTasks.length}</td>
          <td>${completedTasks.length}</td>
        </tr>`;
    }).join('');

    return `
      <table class="agent-table">
        <thead>
          <tr>
            <th>Agent</th>
            <th>Role</th>
            <th>Division</th>
            <th>Model</th>
            <th>Active Tasks</th>
            <th>Completed</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function render(data) {
    const stats = computeStats(data);

    $('#lastUpdated').textContent = fmtDateTime(data.lastUpdated);
    $('#updatedBy').textContent = data.updatedBy || '—';

    $('#app').innerHTML = `
      ${renderSummary(stats)}
      ${renderProgramCards(data)}
      <div class="section-title" style="margin-top:48px;">Projects</div>
      ${renderProjects(data)}
      <div class="section-title" style="margin-top:48px;">All Tasks</div>
      ${renderAllTasks(data)}
      <div class="section-title" style="margin-top:48px;">Agent Organization</div>
      ${renderAgents(data)}
    `;

    // Wire program card clicks to scroll to project group
    $$('.program-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.program;
        const target = document.getElementById('program-' + id);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  }

  // Toggle project expand/collapse
  window.toggleProject = function(header) {
    const body = header.nextElementSibling;
    const chevron = header.querySelector('.chevron');
    body.classList.toggle('open');
    chevron.classList.toggle('open');
  };

  // Fetch data
  const params = new URLSearchParams(window.location.search);
  const key = params.get('key') || '';
  fetch('/api/pm/data' + (key ? '?key=' + encodeURIComponent(key) : ''), { credentials: 'same-origin' })
    .then(r => {
      if (!r.ok) throw new Error('Auth required');
      return r.json();
    })
    .then(render)
    .catch(err => {
      $('#app').innerHTML = `<div class="error">Failed to load: ${esc(err.message)}</div>`;
    });
})();
</script>
<script src="/shared/nav.js"></script>
</body>
</html>
