<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0b12;
  --text: #f0f0f5;
  --accent: #7c6aff;
  --accent-dim: rgba(124,106,255,0.15);
  --green: #22c55e;
  --red: #ef4444;
  --cell-bg: rgba(255,255,255,0.06);
  --cell-border: rgba(255,255,255,0.12);
  --black-cell: rgba(0,0,0,0.6);
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.08);
}
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,106,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 100%, rgba(34,197,94,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at 10% 60%, rgba(96,165,250,0.04) 0%, transparent 50%),
    var(--bg);
}

/* Nav */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 56px;
  background: rgba(14,14,22,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
}
.nav-left { display: flex; align-items: center; gap: 12px; }
.nav-brand img { height: 32px; border-radius: 6px; opacity: 1; }
.nav-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.15); }
.nav-title { font-family: 'Instrument Serif', serif; font-size: 1.25rem; color: #fff; }
.nav-links { display: flex; gap: 8px; }
.nav-links a {
  color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.875rem;
  padding: 6px 12px; border-radius: 8px; transition: all 0.2s;
}
.nav-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-pill { background: rgba(255,255,255,0.06) !important; }

/* Layout */
main {
  max-width: 900px; margin: 0 auto; padding: 24px 16px 80px;
  display: flex; flex-direction: column; align-items: center;
}
.game-header { text-align: center; margin-bottom: 20px; }
.game-header h1 {
  font-family: 'Instrument Serif', serif; font-size: 2rem;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.game-subtitle { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 4px; }

/* Timer + controls bar */
.controls-bar {
  display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace;
}
.timer { font-size: 1.1rem; color: var(--accent); min-width: 60px; text-align: center; }
.btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--card-border);
  background: var(--card-bg); color: var(--text); font-size: 0.8rem;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
}
.btn:hover { background: rgba(255,255,255,0.1); }
.btn-accent { border-color: var(--accent); color: var(--accent); }

/* Game area */
.game-area {
  display: flex; gap: 24px; width: 100%; justify-content: center;
  align-items: flex-start; flex-wrap: wrap;
}

/* Grid */
.grid-container { position: relative; }
.grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 2px; background: rgba(255,255,255,0.08); padding: 2px;
  border-radius: 8px; overflow: hidden;
  box-shadow: 0 0 30px rgba(124,106,255,0.08);
}
.cell {
  width: 64px; height: 64px; position: relative;
  background: var(--cell-bg); border: 1px solid var(--cell-border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif; font-size: 1.5rem; font-weight: 700;
  color: var(--text); cursor: pointer; transition: all 0.15s;
  text-transform: uppercase; user-select: none;
}
.cell.black {
  background: var(--black-cell); cursor: default;
  border-color: transparent;
}
.cell.selected {
  background: var(--accent) !important;
  color: #fff;
  box-shadow: 0 0 12px rgba(124,106,255,0.4);
}
.cell.highlighted {
  background: var(--accent-dim);
  border-color: rgba(124,106,255,0.3);
}
.cell.correct {
  background: rgba(34,197,94,0.2);
  border-color: rgba(34,197,94,0.4);
}
.cell.incorrect {
  background: rgba(239,68,68,0.25);
  border-color: rgba(239,68,68,0.5);
}
.cell-number {
  position: absolute; top: 2px; left: 4px;
  font-size: 0.6rem; font-weight: 600; color: rgba(255,255,255,0.5);
  line-height: 1; pointer-events: none;
}
.cell-letter { pointer-events: none; }

/* Clues */
.clues-container {
  display: flex; flex-direction: column; gap: 16px;
  min-width: 240px; max-width: 320px; flex: 1;
}
.clue-section {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 14px; backdrop-filter: blur(8px);
}
.clue-section h3 {
  font-family: 'Instrument Serif', serif; font-size: 1rem;
  margin-bottom: 8px; color: var(--accent);
}
.clue {
  padding: 6px 8px; border-radius: 6px; cursor: pointer;
  font-size: 0.85rem; line-height: 1.4; transition: all 0.15s;
  color: rgba(255,255,255,0.7); display: flex; gap: 8px;
}
.clue:hover { background: rgba(255,255,255,0.06); }
.clue.active {
  background: var(--accent-dim); color: #fff;
}
.clue-num {
  font-weight: 700; color: var(--accent); min-width: 18px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
}

/* Completion overlay */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
}
.overlay.show { display: flex; }
.overlay-card {
  background: rgba(20,20,30,0.95); border: 1px solid var(--card-border);
  border-radius: 16px; padding: 32px; text-align: center;
  max-width: 360px; width: 90%;
  box-shadow: 0 0 60px rgba(124,106,255,0.15);
}
.overlay-card h2 {
  font-family: 'Instrument Serif', serif; font-size: 1.8rem; margin-bottom: 8px;
}
.overlay-card .time-result {
  font-family: 'JetBrains Mono', monospace; font-size: 2rem;
  color: var(--green); margin: 12px 0;
}
.overlay-card .stats-row {
  display: flex; justify-content: center; gap: 24px; margin: 16px 0;
}
.stat-item { text-align: center; }
.stat-value { font-size: 1.5rem; font-weight: 700; }
.stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); }
.share-btn {
  padding: 12px 32px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; font-size: 1rem;
  font-weight: 600; cursor: pointer; margin-top: 12px;
  font-family: 'DM Sans', sans-serif; transition: all 0.2s;
}
.share-btn:hover { filter: brightness(1.15); }
.share-btn.copied { background: var(--green); }
/* Leaderboard in overlay */
.nickname-row {
  display: flex; gap: 8px; margin-top: 14px;
}
.nickname-in {
  flex: 1; padding: 10px 14px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; outline: none;
  transition: border-color 0.2s;
}
.nickname-in:focus { border-color: rgba(124,106,255,0.4); }
.nickname-in::placeholder { color: rgba(255,255,255,0.2); }
.submit-lb-btn {
  padding: 10px 16px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.submit-lb-btn:disabled { opacity: 0.4; cursor: default; }
.cw-lb-section { margin-top: 14px; text-align: left; }
.cw-lb-title { font-size: 0.58rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 8px; text-align: center; }
.cw-lb-list { display: flex; flex-direction: column; gap: 4px; max-height: 150px; overflow-y: auto; }
.cw-lb-row { display: flex; justify-content: space-between; padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,0.03); font-size: 0.78rem; }
.cw-lb-row:first-child { background: rgba(124,106,255,0.1); color: var(--accent); font-weight: 700; }
.cw-lb-name { color: rgba(255,255,255,0.6); }
.cw-lb-time { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: rgba(255,255,255,0.4); }
.overlay-links { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
.overlay-link {
  padding: 8px 16px; border-radius: 8px; text-decoration: none;
  font-size: 0.72rem; font-weight: 700; transition: all 0.2s;
  border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.04);
}
.overlay-link:hover { color: #fff; background: rgba(255,255,255,0.08); }

/* Confetti */
.confetti-piece {
  position: fixed; width: 10px; height: 10px;
  z-index: 300; pointer-events: none;
  animation: confettiFall 3s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* Mobile */
@media (max-width: 700px) {
  .game-area { flex-direction: column; align-items: center; }
  .clues-container { max-width: 100%; min-width: 0; width: 100%; flex-direction: row; }
  .clue-section { flex: 1; }
  .cell { width: 56px; height: 56px; font-size: 1.3rem; }
}
@media (max-width: 400px) {
  .cell { width: 48px; height: 48px; font-size: 1.1rem; }
  .clues-container { flex-direction: column; }
}

/* Hidden input for mobile keyboard */
#hiddenInput {
  position: absolute; opacity: 0; width: 1px; height: 1px;
  top: -100px; left: -100px;
}

        "I",
        "T",
        "E"
      ],
      [
        "R",
        "I",
        "V",
        "E",
        "R"
      ],
      [
        "S",
        "T",
        "E",
        "A",
        "M"
      ],
      [
        "T",
        "E",
        "R",
        "M",
        "S"
      ]
    ],
    "clues": {
      "across": {
        "1": "Pop suddenly",
        "6": "Join together",
        "7": "Flowing water",
        "8": "Hot vapor",
        "9": "Conditions"
      },
      "down": {
        "1": "Sudden break",
        "2": "Come as one",
        "3": "Stream's big sibling",
        "4": "Boiling water output",
        "5": "Agreement words"
      }
    }
  }
];

// ═══════════════ GAME STATE ═══════════════
let puzzle, userGrid, selectedCell, direction, timerInterval, seconds, started, solved;
let cellNumbers = {};

function getTodayIndex() {
  const d = new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York' });
  let hash = 0;
  for (let i = 0; i < d.length; i++) { hash = ((hash << 5) - hash) + d.charCodeAt(i); hash |= 0; }
  return Math.abs(hash) % PUZZLES.length;
}

function init() {
  puzzle = PUZZLES[getTodayIndex()];
  userGrid = puzzle.grid.map(row => row.map(c => c === '#' ? '#' : ''));
  selectedCell = null;
  direction = 'across';
  seconds = 0;
  started = false;
  solved = false;
  cellNumbers = {};
  numberCells();
  renderGrid();
  renderClues();
  updateTimer();
}

function numberCells() {
  let num = 1;
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (puzzle.grid[r][c] === '#') continue;
      const needsAcross = (c === 0 || puzzle.grid[r][c-1] === '#') && c < 4 && puzzle.grid[r][c+1] !== '#';
      const needsDown = (r === 0 || puzzle.grid[r-1][c] === '#') && r < 4 && puzzle.grid[r+1][c] !== '#';
      if (needsAcross || needsDown) {
        cellNumbers[`${r},${c}`] = num++;
      }
    }
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (puzzle.grid[r][c] === '#' ? ' black' : '');
      cell.dataset.row = r;
      cell.dataset.col = c;
      const num = cellNumbers[`${r},${c}`];
      if (num) cell.innerHTML = `<span class="cell-number">${num}</span>`;
      if (userGrid[r][c] && userGrid[r][c] !== '#') {
        cell.innerHTML += `<span class="cell-letter">${userGrid[r][c]}</span>`;
      }
      if (puzzle.grid[r][c] !== '#') {
        cell.addEventListener('click', () => selectCell(r, c));
      }
      grid.appendChild(cell);
    }
  }
  highlightWord();
}

function renderClues() {
  const acrossDiv = document.getElementById('acrossClues');
  const downDiv = document.getElementById('downClues');
  acrossDiv.innerHTML = '';
  downDiv.innerHTML = '';
  for (const [num, text] of Object.entries(puzzle.clues.across)) {
    const el = document.createElement('div');
    el.className = 'clue';
    el.innerHTML = `<span class="clue-num">${num}</span><span>${text}</span>`;
    el.addEventListener('click', () => selectClue(parseInt(num), 'across'));
    el.dataset.num = num;
    el.dataset.dir = 'across';
    acrossDiv.appendChild(el);
  }
  for (const [num, text] of Object.entries(puzzle.clues.down)) {
    const el = document.createElement('div');
    el.className = 'clue';
    el.innerHTML = `<span class="clue-num">${num}</span><span>${text}</span>`;
    el.addEventListener('click', () => selectClue(parseInt(num), 'down'));
    el.dataset.num = num;
    el.dataset.dir = 'down';
    downDiv.appendChild(el);
  }
}

function selectCell(r, c) {
  if (puzzle.grid[r][c] === '#') return;
  if (selectedCell && selectedCell[0] === r && selectedCell[1] === c) {
    direction = direction === 'across' ? 'down' : 'across';
  }
  selectedCell = [r, c];
  highlightWord();
  document.getElementById('hiddenInput').focus();
}

function selectClue(num, dir) {
  direction = dir;
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (cellNumbers[`${r},${c}`] === num) {
        selectedCell = [r, c];
        highlightWord();
        document.getElementById('hiddenInput').focus();
        return;
      }
    }
  }
}

function getWordCells(r, c, dir) {
  const cells = [];
  if (dir === 'across') {
    let start = c;
    while (start > 0 && puzzle.grid[r][start-1] !== '#') start--;
    for (let i = start; i < 5 && puzzle.grid[r][i] !== '#'; i++) cells.push([r, i]);
  } else {
    let start = r;
    while (start > 0 && puzzle.grid[start-1][c] !== '#') start--;
    for (let i = start; i < 5 && puzzle.grid[i][c] !== '#'; i++) cells.push([i, c]);
  }
  return cells;
}

function highlightWord() {
  document.querySelectorAll('.cell').forEach(el => {
    el.classList.remove('selected', 'highlighted');
  });
  document.querySelectorAll('.clue').forEach(el => el.classList.remove('active'));

  if (!selectedCell) return;
  const [r, c] = selectedCell;
  const wordCells = getWordCells(r, c, direction);
  wordCells.forEach(([wr, wc]) => {
    const el = document.querySelector(`.cell[data-row="${wr}"][data-col="${wc}"]`);
    if (el) el.classList.add('highlighted');
  });
  const selEl = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
  if (selEl) selEl.classList.add('selected');

  // Highlight active clue
  const startCell = wordCells[0];
  const num = cellNumbers[`${startCell[0]},${startCell[1]}`];
  if (num) {
    const clueEl = document.querySelector(`.clue[data-num="${num}"][data-dir="${direction}"]`);
    if (clueEl) {
      clueEl.classList.add('active');
      clueEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }
}

function handleKey(e) {
  if (solved || !selectedCell) return;
  const [r, c] = selectedCell;
  const key = e.key;

  if (key === 'Tab') {
    e.preventDefault();
    direction = direction === 'across' ? 'down' : 'across';
    highlightWord();
    return;
  }

  if (key === 'Backspace') {
    e.preventDefault();
    if (userGrid[r][c]) {
      userGrid[r][c] = '';
      renderGrid();
    } else {
      movePrev();
    }
    return;
  }

  if (key === 'ArrowUp') { e.preventDefault(); moveDir(-1, 0); return; }
  if (key === 'ArrowDown') { e.preventDefault(); moveDir(1, 0); return; }
  if (key === 'ArrowLeft') { e.preventDefault(); moveDir(0, -1); return; }
  if (key === 'ArrowRight') { e.preventDefault(); moveDir(0, 1); return; }

  if (/^[a-zA-Z]$/.test(key)) {
    e.preventDefault();
    if (!started) startTimer();
    userGrid[r][c] = key.toUpperCase();
    renderGrid();
    moveNext();
    checkCompletion();
  }
}

function moveNext() {
  if (!selectedCell) return;
  const [r, c] = selectedCell;
  const wordCells = getWordCells(r, c, direction);
  const idx = wordCells.findIndex(([wr, wc]) => wr === r && wc === c);
  if (idx < wordCells.length - 1) {
    selectedCell = wordCells[idx + 1];
    highlightWord();
  }
}

function movePrev() {
  if (!selectedCell) return;
  const [r, c] = selectedCell;
  const wordCells = getWordCells(r, c, direction);
  const idx = wordCells.findIndex(([wr, wc]) => wr === r && wc === c);
  if (idx > 0) {
    selectedCell = wordCells[idx - 1];
    userGrid[selectedCell[0]][selectedCell[1]] = '';
    renderGrid();
  }
}

function moveDir(dr, dc) {
  if (!selectedCell) return;
  let [r, c] = selectedCell;
  r += dr; c += dc;
  while (r >= 0 && r < 5 && c >= 0 && c < 5) {
    if (puzzle.grid[r][c] !== '#') {
      selectedCell = [r, c];
      if (dr !== 0) direction = 'down';
      if (dc !== 0) direction = 'across';
      highlightWord();
      return;
    }
    r += dr; c += dc;
  }
}

// Timer
function startTimer() {
  if (started) return;
  started = true;
  timerInterval = setInterval(() => {
    seconds++;
    updateTimer();
  }, 1000);
}

function updateTimer() {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// Check
function checkCompletion() {
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (puzzle.grid[r][c] !== '#' && userGrid[r][c] !== puzzle.grid[r][c]) return;
    }
  }
  // Solved!
  solved = true;
  clearInterval(timerInterval);
  showCompletion();
}

document.getElementById('checkBtn').addEventListener('click', () => {
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (puzzle.grid[r][c] === '#' || !userGrid[r][c]) continue;
      const el = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
      if (userGrid[r][c] === puzzle.grid[r][c]) {
        el.classList.add('correct');
      } else {
        el.classList.add('incorrect');
      }
      setTimeout(() => { el.classList.remove('correct', 'incorrect'); }, 1500);
    }
  }
});

document.getElementById('revealBtn').addEventListener('click', () => {
  if (!started) startTimer();
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (puzzle.grid[r][c] !== '#') userGrid[r][c] = puzzle.grid[r][c];
    }
  }
  renderGrid();
  checkCompletion();
});

// Completion
function showCompletion() {
  launchConfetti();
  const stats = loadStats();
  stats.played++;
  stats.streak++;
  if (!stats.best || seconds < stats.best) stats.best = seconds;
  saveStats(stats);

  const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' }).split(',')[0];

  document.getElementById('finalTime').textContent = formatTime(seconds);
  document.getElementById('statPlayed').textContent = stats.played;
  document.getElementById('statStreak').textContent = stats.streak;
  document.getElementById('statBest').textContent = stats.best ? formatTime(stats.best) : '—';

  // Mark all cells correct
  document.querySelectorAll('.cell:not(.black)').forEach(el => el.classList.add('correct'));

  // Hide nickname row if already submitted today
  const alreadySubmitted = localStorage.getItem('nn-crossword-submitted-' + todayStr);
  if (alreadySubmitted) {
    document.getElementById('nicknameRow').style.display = 'none';
    loadCrosswordLeaderboard(todayStr);
  }

  // Submit score handler
  document.getElementById('submitLbBtn').onclick = async () => {
    const nickname = document.getElementById('nicknameInput').value.trim();
    if (!nickname) { document.getElementById('nicknameInput').style.borderColor = 'rgba(239,68,68,0.5)'; return; }
    const btn = document.getElementById('submitLbBtn');
    btn.disabled = true; btn.textContent = '...';
    try {
      await fetch('/api/crossword/score', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date: todayStr, nickname, timeSeconds: seconds, completed: true })
      });
      localStorage.setItem('nn-crossword-submitted-' + todayStr, '1');
      document.getElementById('nicknameRow').style.display = 'none';
      loadCrosswordLeaderboard(todayStr);
    } catch(e) { btn.disabled = false; btn.textContent = 'Retry'; }
  };
  document.getElementById('nicknameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('submitLbBtn').click();
  });

  setTimeout(() => {
    document.getElementById('overlay').classList.add('show');
    if (alreadySubmitted) loadCrosswordLeaderboard(todayStr);
  }, 800);
}

async function loadCrosswordLeaderboard(dateStr) {
  try {
    const res = await fetch(`/api/crossword/leaderboard?date=${dateStr}`);
    const data = await res.json();
    const entries = data.entries || [];
    if (!entries.length) return;
    const medals = ['🥇','🥈','🥉'];
    const lbSection = document.getElementById('cwLbSection');
    const lbList = document.getElementById('cwLbList');
    lbList.innerHTML = entries.map((e, i) => `
      <div class="cw-lb-row">
        <span>${i < 3 ? medals[i] : i+1} <span class="cw-lb-name">${e.nickname.replace(/</g,'&lt;')}</span></span>
        <span class="cw-lb-time">${formatTime(e.time_seconds)}</span>
      </div>
    `).join('');
    lbSection.style.display = 'block';
  } catch(e) {}
}

document.getElementById('overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('show');
  }
});

// Share
document.getElementById('shareBtn').addEventListener('click', () => {
  let grid = '';
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      grid += puzzle.grid[r][c] === '#' ? '⬛' : '🟩';
    }
    grid += '\n';
  }
  const text = `Neural NeXus Mini Crossword\n⏱️ ${formatTime(seconds)}\n\n${grid}\nneuralnexus.press/crossword`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('shareBtn');
    btn.textContent = 'Copied! ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Share 📋'; btn.classList.remove('copied'); }, 2000);
  });
});

// Stats
function loadStats() {
  try { return JSON.parse(localStorage.getItem('nn-crossword-stats')) || { played: 0, streak: 0, best: null }; }
  catch { return { played: 0, streak: 0, best: null }; }
}
function saveStats(s) { localStorage.setItem('nn-crossword-stats', JSON.stringify(s)); }

// Confetti
function launchConfetti() {
  const colors = ['#7c6aff', '#22c55e', '#eab308', '#ef4444', '#60a5fa', '#f472b6'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top = -10 + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (Math.random() * 8 + 5) + 'px';
    piece.style.height = (Math.random() * 8 + 5) + 'px';
    piece.style.animationDelay = (Math.random() * 2) + 's';
    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}

// Keyboard handling
document.addEventListener('keydown', handleKey);
document.getElementById('hiddenInput').addEventListener('input', (e) => {
  const val = e.target.value;
  if (val && /^[a-zA-Z]$/.test(val)) {
    if (!started) startTimer();
    if (selectedCell) {
      userGrid[selectedCell[0]][selectedCell[1]] = val.toUpperCase();
      renderGrid();
      moveNext();
      checkCompletion();
    }
  }
  e.target.value = '';
});

// Auto-select first cell on load
init();
for (let r = 0; r < 5; r++) {
  for (let c = 0; c < 5; c++) {
    if (puzzle.grid[r][c] !== '#') {
      selectCell(r, c);
      r = 5; break;
    }
  }
}
</script>
