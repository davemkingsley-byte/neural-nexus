<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06060b">
<link rel="manifest" href="/app/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>DSST — Neural NeXus</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
:root{--bg:#06060b;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.06);--text:#e0e0e0;--heading:#ffffff;--gold:#d4a853;--green:#4ade80;--red:#ef4444;--radius:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:16px;min-height:100vh;min-height:100dvh;overflow:hidden;touch-action:manipulation;padding-bottom:56px}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.screen.hidden{display:none}
h1{color:var(--heading);font-size:24px;margin-bottom:8px}
h2{color:var(--heading);font-size:20px;margin-bottom:16px}
p{color:rgba(255,255,255,0.5);font-size:15px;line-height:1.6;max-width:320px;margin-bottom:12px}
.btn{display:inline-block;padding:16px 48px;background:linear-gradient(135deg,#d4a853,#c49a48);color:#06060b;font-size:18px;font-weight:700;border:none;border-radius:12px;cursor:pointer;font-family:inherit;transition:transform .2s;min-height:48px}
.btn:active{transform:scale(0.95)}
.btn-outline{background:none;border:1px solid rgba(255,255,255,0.2);color:#e0e0e0;font-size:15px;padding:12px 24px;margin:6px}
/* Symbol key preview */
.key-preview{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;max-width:360px;width:100%;margin:16px 0}
.key-cell{background:rgba(255,255,255,0.06);border-radius:8px;padding:6px 2px;text-align:center}
.key-cell .digit{font-size:12px;color:var(--gold);font-weight:700}
.key-cell .sym{font-size:18px;color:var(--heading)}
/* Game screen */
.game-screen{position:fixed;inset:0;display:flex;flex-direction:column}
.game-screen.hidden{display:none}
.progress-bar{height:4px;background:rgba(255,255,255,0.1);flex-shrink:0}
.progress-fill{height:100%;background:var(--gold);transition:width .5s linear}
.game-header{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;flex-shrink:0}
.game-header .timer{color:var(--gold);font-size:18px;font-weight:700}
.game-header .score-display{color:rgba(255,255,255,0.5);font-size:14px}
/* Key bar */
.key-bar{display:grid;grid-template-columns:repeat(9,1fr);gap:2px;padding:4px 8px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);flex-shrink:0}
.key-bar .kc{text-align:center;padding:4px 0}
.key-bar .kc .d{font-size:11px;color:var(--gold);font-weight:700}
.key-bar .kc .s{font-size:16px;color:var(--heading)}
/* Target */
.target-area{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.target-digit{font-size:120px;font-weight:700;color:var(--heading);line-height:1}
/* Grid */
.symbol-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px calc(16px + env(safe-area-inset-bottom));flex-shrink:0}
.sym-btn{min-height:64px;min-width:64px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;font-size:28px;color:var(--heading);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent}
.sym-btn:active{transform:scale(0.95)}
.sym-btn.correct{background:rgba(74,222,128,0.2);border-color:rgba(74,222,128,0.4)}
.sym-btn.wrong{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.4)}
/* Results */
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:320px;width:100%;margin:20px 0}
.result-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;text-align:center}
.result-item .val{font-size:28px;font-weight:700;color:#fff}
.result-item .lab{font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px}
.result-item.highlight .val{color:var(--gold)}
.btns{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{text-align:center;max-width:300px;width:100%}
.auth-box h2{color:var(--heading);margin-bottom:16px}
.auth-box input{width:100%;padding:14px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;color:var(--heading);font-size:16px;font-family:inherit;text-align:center;margin-bottom:12px}
.auth-box button{width:100%;padding:14px;background:var(--gold);color:#06060b;font-weight:700;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-family:inherit}
/* Test navigation */
/* Top test navigation */
.test-nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;gap:8px;padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;font-size:13px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.08);overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.test-nav::-webkit-scrollbar{display:none}
.test-nav .tn-link{color:rgba(255,255,255,0.4);text-decoration:none;padding:4px 8px;border-radius:6px;transition:color .2s}
.test-nav .tn-link.active{color:#d4a853}
.test-nav .tn-sep{color:rgba(255,255,255,0.15);font-size:10px}
.test-nav.hidden{display:none}
</style>
</head>
<body>
<nav class="test-nav" id="testNav">
  <a href="/app/test/pvt.html" class="tn-link">PVT</a>
  <span class="tn-sep">·</span>
  <a href="/app/test/dsst.html" class="tn-link active">DSST</a>
  <span class="tn-sep">·</span>
  <a href="/app/test/nback.html" class="tn-link">N-Back</a>
  <span class="tn-sep">·</span>
  <a href="/app/test/stroop.html" class="tn-link">Stroop</a>
  <span class="tn-sep">·</span>
  <a href="/app/test/avlt.html" class="tn-link">AVLT</a>
  <span class="tn-sep">·</span>
  <a href="/app/test/tmtb.html" class="tn-link">TMT-B</a>
</nav>

<!-- Instructions -->
<div class="screen" id="instrScreen">
  <h1>🔢 DSST</h1>
  <h2>Digit Symbol Substitution</h2>
  <p>Match each digit to its symbol as fast as you can. You have 90 seconds.</p>
  <div class="key-preview" id="keyPreview"></div>
  <p style="color:rgba(255,255,255,0.3)">90 seconds</p>
  <button class="btn" onclick="startTest()">Start</button>
</div>

<!-- Game -->
<div class="game-screen hidden" id="gameScreen">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:100%"></div></div>
  <div class="game-header">
    <div class="timer" id="timer">1:30</div>
    <div class="score-display"><span id="correctCount">0</span> correct</div>
  </div>
  <div class="key-bar" id="keyBar"></div>
  <div class="target-area"><div class="target-digit" id="targetDigit">5</div></div>
  <div class="symbol-grid" id="symbolGrid"></div>
</div>

<!-- Results -->
<div class="screen hidden" id="resultsScreen">
  <h2>Results</h2>
  <div class="results-grid" id="resultsGrid"></div>
  <div class="btns">
    <a href="/app/test/" class="btn btn-outline">Back to Tests</a>
    <a href="/app/test/nback.html" class="btn">Next Test →</a>
  </div>
</div>

<!-- Auth -->
<div class="auth-overlay" id="authOverlay" style="display:none">
  <div class="auth-box">
    <h2>Neural NeXus</h2>
    <p style="color:rgba(255,255,255,0.4);margin-bottom:20px;font-size:14px">Enter password</p>
    <input type="password" id="authPass" placeholder="Password" autocomplete="current-password">
    <button onclick="doAuth()">Enter</button>
  </div>
</div>

<script>
function checkAuth(){if(!document.cookie.includes('dash_auth=authenticated')){document.getElementById('authOverlay').style.display='flex';return false}return true}
function doAuth(){const p=document.getElementById('authPass').value;if(p==='nexus2026'){document.cookie='dash_auth=authenticated;max-age=2592000;path=/';location.reload()}else{document.getElementById('authPass').value='';document.getElementById('authPass').placeholder='Wrong password'}}
document.addEventListener('DOMContentLoaded',()=>{
  if(!checkAuth())return;
  const ap=document.getElementById('authPass');if(ap)ap.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth()});
  initKey();
});

const SYMBOLS = ['▲','○','★','□','◆','▽','●','✕','△'];
const DURATION = 90;
let mapping = {}; // digit -> symbol
let currentDigit = 0;
let correct = 0;
let errors = 0;
let responseTimes = [];
let trialStart = 0;
let timerInterval = null;
let timeLeft = DURATION;
let wakeLock = null;

function initKey() {
  // Randomize mapping each session
  const shuffled = [...SYMBOLS].sort(() => Math.random() - 0.5);
  for (let i = 1; i <= 9; i++) mapping[i] = shuffled[i - 1];

  // Preview
  const preview = document.getElementById('keyPreview');
  let html = '';
  for (let i = 1; i <= 9; i++) html += `<div class="key-cell"><div class="digit">${i}</div><div class="sym">${mapping[i]}</div></div>`;
  preview.innerHTML = html;
}

function show(id) {
  document.querySelectorAll('.screen,.game-screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  const nav=document.getElementById('testNav');if(nav)nav.classList.toggle('hidden',id==='gameScreen');
}

async function startTest() {
  show('gameScreen');
  correct = 0;
  errors = 0;
  responseTimes = [];
  timeLeft = DURATION;
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}

  // Key bar
  const kb = document.getElementById('keyBar');
  let kh = '';
  for (let i = 1; i <= 9; i++) kh += `<div class="kc"><div class="d">${i}</div><div class="s">${mapping[i]}</div></div>`;
  kb.innerHTML = kh;

  // Symbol grid (shuffled)
  renderGrid();
  nextDigit();
  startTimer();
}

function renderGrid() {
  const grid = document.getElementById('symbolGrid');
  const shuffled = [...SYMBOLS].sort(() => Math.random() - 0.5);
  let html = '';
  shuffled.forEach(sym => {
    html += `<button class="sym-btn" data-sym="${sym}" onclick="handleTap(this,'${sym}')">${sym}</button>`;
  });
  grid.innerHTML = html;
}

function nextDigit() {
  currentDigit = Math.floor(Math.random() * 9) + 1;
  document.getElementById('targetDigit').textContent = currentDigit;
  document.getElementById('correctCount').textContent = correct;
  trialStart = performance.now();
}

function handleTap(btn, sym) {
  const rt = Math.round(performance.now() - trialStart);
  responseTimes.push(rt);
  const correctSym = mapping[currentDigit];
  if (sym === correctSym) {
    correct++;
    btn.classList.add('correct');
  } else {
    errors++;
    btn.classList.add('wrong');
  }
  setTimeout(() => {
    btn.classList.remove('correct', 'wrong');
    // Reshuffle grid each trial
    renderGrid();
    nextDigit();
  }, 150);
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    const pct = (timeLeft / DURATION) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    if (timeLeft <= 0) endTest();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

async function endTest() {
  clearInterval(timerInterval);
  if (wakeLock) { try { await wakeLock.release(); } catch {} }

  const total = correct + errors;
  const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
  const avgRT = responseTimes.length > 0 ? Math.round(responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length) : 0;

  document.getElementById('resultsGrid').innerHTML = `
    <div class="result-item highlight"><div class="val">${correct}</div><div class="lab">Correct</div></div>
    <div class="result-item"><div class="val">${errors}</div><div class="lab">Errors</div></div>
    <div class="result-item highlight"><div class="val">${accuracy}%</div><div class="lab">Accuracy</div></div>
    <div class="result-item"><div class="val">${avgRT}</div><div class="lab">Avg RT (ms)</div></div>
  `;
  show('resultsScreen');

  // Save
  const now = new Date();
  const date = now.toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
  const time = now.toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour12: false });
  const h = parseInt(now.toLocaleString('en-US', { timeZone: 'America/New_York', hour: 'numeric', hour12: false }));
  const session = h < 14 ? 'morning' : 'evening';
  try {
    await fetch('/api/cognitive/results', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        test_type: 'dsst',
        date,
        time,
        session,
        scores_json: JSON.stringify({ correct, errors, accuracy, avgRT, total })
      })
    });
  } catch {}
}
</script>
</body>
</html>
