<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="msapplication-config" content="/browserconfig.xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<link rel="manifest" href="/app/manifest.json">
<link rel="apple-touch-icon" href="/app/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>SFN Daily Check | Neural NeXus</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060b;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.06);--text:#e0e0e0;--heading:#ffffff;--gold:#d4a853;--green:#4ade80;--red:#ef4444;--radius:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:16px;line-height:1.5;min-height:100vh;padding:0 16px 24px}
.container{max-width:480px;margin:0 auto;padding-top:calc(16px + env(safe-area-inset-top))}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);margin-bottom:12px}
h1{color:var(--heading);font-size:24px;font-weight:700}
.header{padding:20px 0 8px}
.header p{color:rgba(255,255,255,0.4);font-size:14px;margin-top:4px}
.log-field{margin-bottom:18px}
.log-field label{display:block;font-size:14px;font-weight:500;margin-bottom:8px}
.slider-wrap{position:relative}
.slider-wrap{display:flex;align-items:center;gap:10px}
.slider-wrap input[type=range]{-webkit-appearance:none;flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.1);outline:none}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--gold);cursor:pointer}
.slider-val{min-width:28px;text-align:right;font-size:16px;font-weight:700;color:var(--gold)}
.slider-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.25);margin-top:4px;padding:0 2px}
.avg-card{text-align:center;padding:24px 20px}
.avg-score{font-size:48px;font-weight:700;color:var(--gold)}
.avg-label{font-size:13px;color:rgba(255,255,255,0.4);margin-top:4px}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.history-row:last-child{border-bottom:none}
.history-date{font-size:13px;color:rgba(255,255,255,0.5)}
.history-avg{font-size:15px;font-weight:600;color:var(--gold)}
.trend-arrow{font-size:12px;margin-left:6px}
.trend-up{color:var(--red)}
.trend-down{color:var(--green)}
.trend-flat{color:rgba(255,255,255,0.3)}
textarea,input[type=text]{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--heading);font-size:15px;font-family:inherit;resize:vertical}
textarea{min-height:110px}
.meta-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:rgba(255,255,255,0.4);margin-top:8px}
.supp-toggle{display:flex;gap:8px}
.supp-btn{flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-size:14px;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center}
.supp-btn.active-yes{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.3);color:var(--green)}
.supp-btn.active-no{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:var(--red)}
.btn-gold{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#d4a853,#c49a48);color:#06060b;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;text-align:center;text-decoration:none;transition:transform .2s,box-shadow .2s;margin-top:16px}
.btn-gold:active{transform:scale(0.97)}
.save-msg{text-align:center;font-size:13px;color:var(--green);margin-top:12px;display:none}
.back-link{display:inline-block;color:var(--gold);text-decoration:none;font-size:14px;font-weight:600;margin-bottom:18px}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="/app/" class="back-link">&larr; Back to app</a>
    <h1>SFN Daily Check</h1>
    <p>Quick daily symptom tracking for small fiber neuropathy patterns.</p>
  </div>

  <div class="card">
    <div class="card-title">Symptoms</div>
    <div id="sliders"></div>
  </div>

  <div class="card">
    <div class="card-title">Notes</div>
    <div class="log-field" style="margin-bottom:0">
      <label for="notes">Optional notes</label>
      <textarea id="notes" maxlength="250" placeholder="Anything notable today?"></textarea>
      <div class="meta-row"><span>Optional</span><span id="notesCount">0/250</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">New Symptoms</div>
    <div class="log-field" style="margin-bottom:0">
      <label>Any new symptoms?</label>
      <div class="supp-toggle">
        <button class="supp-btn" id="newYes" type="button" onclick="setNewSymptoms(true)">Yes</button>
        <button class="supp-btn active-no" id="newNo" type="button" onclick="setNewSymptoms(false)">No</button>
      </div>
    </div>
    <div id="newSymptomsWrap" class="hidden" style="margin-top:16px;">
      <input type="text" id="newSymptomsText" maxlength="250" placeholder="Describe the new symptoms">
    </div>
    <button class="btn-gold" type="button" onclick="saveDaily()">Save</button>
    <div class="save-msg" id="saveMsg">Saved ✓</div>
  </div>

  <!-- Longitudinal Tracker -->
  <div class="card avg-card" id="avgCard" style="display:none">
    <div class="card-title">Today's Average</div>
    <div class="avg-score" id="todayAvg">--</div>
    <div class="avg-label">out of 10 &middot; <span id="avgTrend"></span></div>
  </div>

  <div class="card" id="historyCard" style="display:none">
    <div class="card-title">Recent History (7-Day Avg)</div>
    <div id="historyList"></div>
  </div>
</div>
<script>
const key = new URLSearchParams(window.location.search).get('key') || '';
const sliderFields = [
  ['fingertip_numbness', 'Fingertip numbness/tingling'],
  ['shin_numbness', 'Shin/leg numbness'],
  ['tongue_sensation', 'Tongue/oral sensation'],
  ['cold_extremities', 'Cold extremities'],
  ['cognitive_fog', 'Cognitive fog'],
  ['ear_symptoms', 'Ear symptoms'],
  ['overall_severity', 'Overall severity']
];
let hasNewSymptoms = false;

function todayStr() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
}

function apiUrl(path) {
  return key ? `${path}?key=${encodeURIComponent(key)}` : path;
}

function renderSliders() {
  const el = document.getElementById('sliders');
  el.innerHTML = sliderFields.map(([id, label]) => `
    <div class="log-field">
      <label for="${id}">${label}</label>
      <div class="slider-wrap">
        <input type="range" min="0" max="10" value="0" id="${id}" oninput="document.getElementById('${id}Val').textContent=this.value">
        <span class="slider-val" id="${id}Val">0</span>
      </div>
      <div class="slider-labels"><span>0</span><span>2</span><span>4</span><span>6</span><span>8</span><span>10</span></div>
    </div>`).join('');
}

function setNewSymptoms(value) {
  hasNewSymptoms = value;
  document.getElementById('newYes').className = 'supp-btn' + (value ? ' active-yes' : '');
  document.getElementById('newNo').className = 'supp-btn' + (!value ? ' active-no' : '');
  document.getElementById('newSymptomsWrap').classList.toggle('hidden', !value);
}

async function saveDaily() {
  const scores = {};
  sliderFields.forEach(([id]) => scores[id] = parseInt(document.getElementById(id).value));
  const payload = {
    date: todayStr(),
    scores,
    notes: document.getElementById('notes').value.trim(),
    new_symptoms: hasNewSymptoms,
    new_symptoms_text: hasNewSymptoms ? document.getElementById('newSymptomsText').value.trim() : ''
  };
  try {
    const res = await fetch(apiUrl('/api/cognitive/sfn/daily'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('Save failed');
    const msg = document.getElementById('saveMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2500);
    loadHistory();
  } catch (err) {
    alert('Save failed');
  }
}

document.getElementById('notes').addEventListener('input', e => {
  document.getElementById('notesCount').textContent = `${e.target.value.length}/250`;
});

async function loadHistory() {
  try {
    const res = await fetch(apiUrl('/api/cognitive/sfn/daily?limit=30'));
    if (!res.ok) return;
    const data = await res.json();
    if (!data || !data.length) return;

    // Show today's average if today has an entry
    const today = todayStr();
    const todayEntries = data.filter(d => d.date === today);
    if (todayEntries.length > 0) {
      const latest = todayEntries[0];
      const fields = ['fingertip_numbness','shin_numbness','tongue_sensation','cold_extremities','cognitive_fog','ear_symptoms','overall_severity'];
      const avg = fields.reduce((s, f) => s + (latest[f] || 0), 0) / fields.length;
      document.getElementById('todayAvg').textContent = avg.toFixed(1);
      document.getElementById('avgCard').style.display = '';

      // Pre-fill sliders with today's values
      fields.forEach(f => {
        const el = document.getElementById(f);
        if (el) { el.value = latest[f] || 0; document.getElementById(f + 'Val').textContent = latest[f] || 0; }
      });
      if (latest.notes) document.getElementById('notes').value = latest.notes;
    }

    // Build daily averages grouped by date
    const byDate = {};
    data.forEach(row => {
      if (!byDate[row.date]) byDate[row.date] = [];
      byDate[row.date].push(row);
    });
    const dailyAvgs = Object.entries(byDate).map(([date, rows]) => {
      const last = rows[0];
      const fields = ['fingertip_numbness','shin_numbness','tongue_sensation','cold_extremities','cognitive_fog','ear_symptoms','overall_severity'];
      const avg = fields.reduce((s, f) => s + (last[f] || 0), 0) / fields.length;
      return { date, avg };
    }).sort((a, b) => b.date.localeCompare(a.date));

    // Trend for today
    if (dailyAvgs.length >= 2 && dailyAvgs[0].date === today) {
      const diff = dailyAvgs[0].avg - dailyAvgs[1].avg;
      const trendEl = document.getElementById('avgTrend');
      if (diff > 0.3) trendEl.innerHTML = '<span class="trend-arrow trend-up">&#9650;</span> worse than yesterday';
      else if (diff < -0.3) trendEl.innerHTML = '<span class="trend-arrow trend-down">&#9660;</span> better than yesterday';
      else trendEl.innerHTML = '<span class="trend-arrow trend-flat">&#9654;</span> same as yesterday';
    }

    // History list (last 14 days)
    if (dailyAvgs.length > 0) {
      const list = document.getElementById('historyList');
      list.innerHTML = dailyAvgs.slice(0, 14).map((d, i, arr) => {
        const dateObj = new Date(d.date + 'T12:00:00');
        const label = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        let trend = '';
        if (i < arr.length - 1) {
          const diff = d.avg - arr[i + 1].avg;
          if (diff > 0.3) trend = '<span class="trend-arrow trend-up">&#9650;</span>';
          else if (diff < -0.3) trend = '<span class="trend-arrow trend-down">&#9660;</span>';
          else trend = '<span class="trend-arrow trend-flat">=</span>';
        }
        return `<div class="history-row"><span class="history-date">${label}</span><span class="history-avg">${d.avg.toFixed(1)}${trend}</span></div>`;
      }).join('');
      document.getElementById('historyCard').style.display = '';
    }
  } catch (e) { console.error('Failed to load history:', e); }
}

renderSliders();
setNewSymptoms(false);
loadHistory();
</script>
</body>
</html>
