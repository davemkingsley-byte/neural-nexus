<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="msapplication-config" content="/browserconfig.xml">
<meta name="theme-color" content="#0a0a1a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>SFN-SIQ | Neural NeXus</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060b;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.06);--text:#e0e0e0;--heading:#ffffff;--gold:#d4a853;--green:#4ade80;--radius:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:16px;line-height:1.5;min-height:100vh;padding:0 16px 24px}
.container{max-width:560px;margin:0 auto;padding-top:calc(16px + env(safe-area-inset-top))}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);margin-bottom:12px}
h1{color:var(--heading);font-size:24px;font-weight:700}
.header{padding:20px 0 8px}.header p{color:rgba(255,255,255,0.4);font-size:14px;margin-top:4px}
.back-link{display:inline-block;color:var(--gold);text-decoration:none;font-size:14px;font-weight:600;margin-bottom:18px}
.score-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(212,168,83,0.15);color:var(--gold);font-size:14px;font-weight:700;padding:8px 14px;border-radius:999px}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.history-row:last-child{border-bottom:none}
.history-date{font-size:13px;color:rgba(255,255,255,0.5)}
.history-score{font-size:15px;font-weight:700;color:var(--gold)}
.trend-arrow{font-size:12px;margin-left:6px}
.trend-up{color:var(--red)}
.trend-down{color:var(--green)}
.trend-flat{color:rgba(255,255,255,0.3)}
.empty-state{font-size:14px;color:rgba(255,255,255,0.45)}
.question{padding:18px 0;border-bottom:1px solid var(--border)}
.question:last-child{border-bottom:none;padding-bottom:0}
.question:first-child{padding-top:0}
.question-title{font-size:15px;font-weight:600;color:var(--heading);margin-bottom:12px}
.options{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.option{display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 6px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,0.03);font-size:12px;color:rgba(255,255,255,0.75);text-align:center}
.option input{accent-color:var(--gold)}
textarea{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--heading);font-size:15px;font-family:inherit;resize:vertical;min-height:90px}
.btn-gold{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#d4a853,#c49a48);color:#06060b;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;text-align:center;text-decoration:none;transition:transform .2s,box-shadow .2s;margin-top:16px}
.btn-gold:active{transform:scale(0.97)}
.save-msg{text-align:center;font-size:13px;color:var(--green);margin-top:12px;display:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="/app/" class="back-link">&larr; Back to app</a>
    <h1>SFN-SIQ Weekly</h1>
    <p>Weekly symptom inventory with a composite score.</p>
  </div>
  <div class="card">
    <div class="card-title">Composite Score</div>
    <div class="score-pill">Total: <span id="compositeScore">0</span> / 39</div>
  </div>
  <div class="card">
    <div class="card-title">Questions</div>
    <div id="questions"></div>
  </div>
  <div class="card">
    <div class="card-title">Notes</div>
    <textarea id="notes" maxlength="250" placeholder="Optional notes"></textarea>
    <button class="btn-gold" type="button" onclick="saveSiq()">Save Weekly SFN-SIQ</button>
    <div class="save-msg" id="saveMsg">Saved ✓</div>
  </div>

  <div class="card">
    <div class="card-title">Recent Scores</div>
    <div id="recentScoresList" class="empty-state">Loading recent scores…</div>
  </div>
</div>
<script>
const key = new URLSearchParams(window.location.search).get('key') || '';
const questions = [
  'Burning in hands','Burning in feet','Sheet intolerance (feet)','Flushing','Dry eyes','Dry mouth','Orthostatic dizziness','Bowel disturbances','Urinary problems','Sweating changes','Palpitations/racing heart','Hot flashes','Hypersensitivity in legs'
];
const optionLabels = ['Never','Sometimes','Often','Always'];
function apiUrl(path) { return key ? `${path}?key=${encodeURIComponent(key)}` : path; }
function todayStr() { return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' }); }
function renderQuestions() {
  document.getElementById('questions').innerHTML = questions.map((q, i) => `
    <div class="question">
      <div class="question-title">${i + 1}. ${q}</div>
      <div class="options">
        ${optionLabels.map((label, val) => `
          <label class="option">
            <input type="radio" name="q${i + 1}" value="${val}" ${val === 0 ? 'checked' : ''} onchange="updateScore()">
            <span>${val}</span>
            <span>${label}</span>
          </label>`).join('')}
      </div>
    </div>`).join('');
}
function gatherAnswers() {
  const answers = {};
  for (let i = 1; i <= 13; i++) {
    answers[`q${i}`] = parseInt(document.querySelector(`input[name="q${i}"]:checked`).value);
  }
  return answers;
}
function updateScore() {
  const total = Object.values(gatherAnswers()).reduce((a, b) => a + b, 0);
  document.getElementById('compositeScore').textContent = total;
}
function formatDisplayDate(dateStr) {
  const d = new Date(`${dateStr}T12:00:00`);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function trendMarkup(current, previous) {
  if (previous == null) return '';
  const diff = current - previous;
  if (diff > 0) return '<span class="trend-arrow trend-up">▲</span>';
  if (diff < 0) return '<span class="trend-arrow trend-down">▼</span>';
  return '<span class="trend-arrow trend-flat">=</span>';
}

async function loadRecentScores() {
  const list = document.getElementById('recentScoresList');
  if (!list) return;
  try {
    const res = await fetch(apiUrl('/api/cognitive/sfn/siq?limit=10'));
    if (!res.ok) throw new Error('Load failed');
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) {
      list.className = 'empty-state';
      list.textContent = 'No SFN-SIQ scores recorded yet.';
      return;
    }
    list.className = '';
    list.innerHTML = data.map((row, index, arr) => {
      const previous = index < arr.length - 1 ? arr[index + 1].composite_score : null;
      return `<div class="history-row"><span class="history-date">${formatDisplayDate(row.date)}</span><span class="history-score">${row.composite_score} / 39${trendMarkup(row.composite_score, previous)}</span></div>`;
    }).join('');
  } catch (err) {
    list.className = 'empty-state';
    list.textContent = 'Unable to load recent scores.';
  }
}

async function saveSiq() {
  try {
    const res = await fetch(apiUrl('/api/cognitive/sfn/siq'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: todayStr(), answers: gatherAnswers(), notes: document.getElementById('notes').value.trim() })
    });
    if (!res.ok) throw new Error('Save failed');
    const msg = document.getElementById('saveMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2500);
    loadRecentScores();
  } catch (err) {
    alert('Save failed');
  }
}
renderQuestions();
updateScore();
loadRecentScores();
</script>
</body>
</html>
