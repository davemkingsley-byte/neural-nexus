<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#6ec6ff" />
  <title>Rift Runner — Neural NeXus</title>
  <style>
    :root { color-scheme: dark; --safe-bottom: env(safe-area-inset-bottom, 0px); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
    html, body { margin:0; height:100%; overflow:hidden; background:#061521; font-family: ui-rounded, system-ui, -apple-system, Segoe UI, sans-serif; }
    #wrap { position:fixed; inset:0; display:grid; place-items:center; background:linear-gradient(#6ec6ff 0%, #a8e7ff 48%, #274262 49%, #061521 100%); }
    canvas { width:100vw; height:100dvh; display:block; image-rendering: pixelated; }
    .hud { position:fixed; inset: max(12px, env(safe-area-inset-top)) 12px auto 12px; display:flex; justify-content:space-between; gap:10px; color:white; font-weight:900; text-shadow:0 2px 0 #123, 0 0 8px #123; pointer-events:none; letter-spacing:.03em; }
    .pill { background:rgba(3,18,32,.35); border:1px solid rgba(255,255,255,.22); border-radius:999px; padding:8px 12px; backdrop-filter: blur(8px); }
    .mini { color:white; font-weight:1000; pointer-events:auto; font-size:1rem; }
    #toast { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); max-width:320px; padding:12px 14px; border-radius:14px; background:rgba(4,18,35,.9); border:1px solid rgba(157,252,255,.45); color:white; font-weight:800; text-align:center; display:none; z-index:5; }
    #overlay { position:fixed; inset:0; display:grid; place-items:center; padding:22px; background:radial-gradient(circle at 50% 35%, rgba(255,255,255,.25), rgba(3,12,24,.78)); color:white; text-align:center; }
    #panel { max-width:520px; background:rgba(4,18,35,.72); border:1px solid rgba(255,255,255,.22); border-radius:28px; padding:24px; box-shadow:0 20px 80px rgba(0,0,0,.35); backdrop-filter: blur(14px); }
    h1 { margin:.1rem 0 .3rem; font-size:clamp(2rem, 10vw, 4rem); line-height:.9; }
    p { margin:.7rem 0; color:#dbefff; font-size:1rem; }
    button { appearance:none; border:0; border-radius:999px; padding:14px 22px; margin-top:12px; font:900 1.05rem ui-rounded, system-ui; color:#05223b; background:linear-gradient(#ffe86c,#ffb22e); box-shadow:0 6px 0 #9b5512, 0 12px 30px rgba(0,0,0,.3); }
    button:active { transform:translateY(4px); box-shadow:0 2px 0 #9b5512; }
    .controls { position:fixed; left:0; right:0; bottom:calc(12px + var(--safe-bottom)); display:flex; justify-content:space-between; padding:0 18px; pointer-events:none; }
    .cluster { display:flex; gap:12px; pointer-events:auto; }
    .ctrl { width:66px; height:66px; border-radius:50%; border:2px solid rgba(255,255,255,.33); background:rgba(5,22,40,.42); position:relative; color:white; font-size:28px; font-weight:1000; display:grid; place-items:center; user-select:none; box-shadow:inset 0 2px 8px rgba(255,255,255,.12), 0 8px 24px rgba(0,0,0,.22); backdrop-filter: blur(8px); transition:transform .06s ease, background .06s ease, box-shadow .06s ease; }
    .ctrl::before { content:''; position:absolute; inset:-12px; border-radius:50%; }
    .ctrl.pressed { transform:translateY(4px) scale(.96); background:rgba(157,252,255,.72); color:#05223b; box-shadow:inset 0 2px 10px rgba(255,255,255,.22), 0 4px 14px rgba(0,0,0,.22); }
    .ctrl small { display:block; font-size:10px; line-height:1; letter-spacing:.04em; margin-top:-6px; }
    .ctrl.sprint { font-size:21px; grid-template-rows:1fr auto; padding:10px 3px 7px; }
    .ctrl.big { width:78px; height:78px; background:rgba(255,180,38,.55); }
    .ctrl.down { transform:translateY(10px); }
    .ctrl.down.pressed { transform:translateY(14px) scale(.96); }
    .ctrl.active { background:rgba(157,252,255,.7); color:#05223b; box-shadow:0 0 0 4px rgba(157,252,255,.22), 0 10px 28px rgba(0,0,0,.25); }
    @media (min-width: 900px) { .ctrl { opacity:.45 } }
    @media (orientation: portrait) {
      #wrap { align-items:start; padding-top:max(36px, env(safe-area-inset-top)); padding-bottom:118px; }
      canvas { width:100vw; height:320px; border-radius:0 0 18px 18px; box-shadow:0 10px 30px rgba(0,0,0,.25); }
      .hud { inset:max(8px, env(safe-area-inset-top)) 8px auto 8px; }
      .pill { padding:7px 10px; font-size:.88rem; }
      .controls { bottom:0; min-height:calc(104px + var(--safe-bottom)); align-items:center; padding:10px 12px calc(10px + var(--safe-bottom)); background:linear-gradient(transparent, rgba(6,21,33,.18) 18%, rgba(6,21,33,.58)); }
      .ctrl { width:64px; height:64px; background:rgba(5,22,40,.54); border-color:rgba(157,252,255,.5); position:relative; }
      .ctrl::before { content:''; position:absolute; inset:-12px; border-radius:50%; }
      .ctrl.big { width:78px; height:78px; }
      .cluster { gap:10px; }
    }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="game" aria-label="Rift Runner platform game"></canvas></div>
  <div class="hud"><div class="pill" id="score">Shards 0</div><div class="pill" id="status">Rift 1</div><div class="pill" id="lives">Lives 3</div><div class="pill" id="version">v24</div><button class="pill mini" id="pauseBtn">↻</button></div><div id="toast" role="status" aria-live="polite"></div>
  <div class="controls" aria-hidden="true">
    <div class="cluster"><div class="ctrl" data-k="left">◀</div><div class="ctrl" data-k="right">▶</div></div>
    <div class="cluster"><div class="ctrl down sprint" data-k="run"><span>⚡</span><small>SPRINT</small></div><div class="ctrl big" data-k="jump">↑</div></div>
  </div>
  <div id="overlay"><div id="panel"><h1>Rift Runner</h1><p>A bright 16-bit adventure: sprint, jump, crack crystal caches, dodge goblins, chain phase shards, and reach the rift gate.</p><p><b>Controls:</b> arrows/buttons to move, ↑ to jump. Tap ⚡ once to toggle sprint.</p><button id="start">Play</button></div></div>
<script>
(() => {
  const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
  const ui = { score: document.getElementById('score'), lives: document.getElementById('lives'), status: document.getElementById('status'), overlay: document.getElementById('overlay'), start: document.getElementById('start'), pause: document.getElementById('pauseBtn') };
  const BASE_W = 432, H = 243, keys = Object.create(null);
  let W = BASE_W, VH = H, yOff = 0, mobileSprint = false, dirPointers = new Map();
  const initialPanel = document.getElementById('panel').innerHTML;
  let last = 0, cam = 0, running = false, starting = false, message = '', boostToken = 0, secretFlash = 0, levelNo = 1, riftTime = 7.5, echoTime = 2.2, shake = 0, hitPause = 0, audioCtx = null;
  const levels = [{
    width: 3300,
    platforms: [[0,220,520,40],[600,220,410,40],[1080,220,95,40],[1325,220,185,40],[1600,220,150,40],[1840,220,200,40],[2130,220,160,40],[2450,220,110,40],[2650,220,650,40],[250,178,100,18],[380,154,90,18],[700,166,130,18],[890,138,100,18],[1380,146,95,18],[1710,160,130,18],[1930,132,95,18],[2250,168,120,18],[2470,140,95,18],[2740,160,120,18],[2940,128,110,18]],
    blocks: [[285,146,28,28,'coin'],[317,146,28,28,'coin'],[735,134,28,28,'boost'],[1210,140,28,28,'coin'],[1242,140,28,28,'coin'],[1760,128,28,28,'boost'],[2310,136,28,28,'coin'],[2810,126,28,28,'coin'],[2842,126,28,28,'coin'],[3012,96,28,28,'boost']],
    rifts: [[1085,188,34,32,[0]],[1565,188,34,32,[1]],[2190,188,34,32,[2]],[2705,188,34,32,[3]]],
    hidden: [[1124,220,220,18,false,0],[1740,220,118,18,false,0],[2280,220,185,18,false,0],[2752,148,185,18,false,0]],
    gates: [[1450,184,28,36],[2065,184,28,36],[2525,184,28,36]],
    signs: [[1010,188,'SHARD → BRIDGE'],[1490,188,'SAFE OR PHASE?'],[2590,188,'ECHO STAYS 2s'],[2720,188,'ECHO → SECRET']],
    props: [[180,188,'spire'],[1000,188,'spire'],[1510,188,'arch'],[2140,188,'spire'],[2880,188,'arch']],
    coins: [[150,184],[220,184],[298,120],[330,120],[420,128],[640,184],[750,108],[900,112],[960,108],[1125,194],[1180,194],[1240,194],[1300,194],[1390,118],[1510,184],[1640,140],[1730,132],[1810,194],[1940,100],[2180,184],[2300,194],[2380,194],[2490,112],[2710,128],[2825,100],[2865,100],[2965,102],[3040,74],[3150,184]],
    enemies: [[760,188,75],[1320,188,90],[1830,188,95],[2390,188,105],[3060,188,100]],
    phaseShards: [[1445,116],[1485,116],[1525,116],[1995,92],[2035,92],[2075,92],[2860,96],[2900,96],[2940,96]],
    secret: [[3050,82,120,18,false,0]],
    secretShards: [[3070,54],[3105,44],[3140,54]],
    flag: 3220,
    riftTime: 7.5,
    echoTime: 2.2
  },{
    width: 3300,
    platforms: [[0,220,420,40],[500,220,280,40],[880,220,210,40],[1210,220,260,40],[1580,220,190,40],[1880,220,240,40],[2220,220,160,40],[2500,220,800,40],[210,168,120,18],[430,138,110,18],[650,112,100,18],[980,164,120,18],[1320,142,110,18],[1700,112,130,18],[2020,150,110,18],[2320,118,120,18],[2760,104,120,18],[2990,146,130,18]],
    blocks: [[450,106,28,28,'boost'],[1340,110,28,28,'coin'],[1718,80,28,28,'boost'],[2790,72,28,28,'coin'],[3020,114,28,28,'boost']],
    rifts: [[720,188,34,32,[0]],[1030,188,34,32,[1]],[1410,188,34,32,[2]],[2070,188,34,32,[3]],[2320,188,34,32,[4]]],
    hidden: [[780,184,120,18,false,0],[1090,198,120,18,false,0],[1470,184,110,18,false,0],[2130,184,120,18,false,0],[2380,154,120,18,false,0]],
    gates: [[1160,184,28,36],[1810,184,28,36],[2460,184,28,36]],
    signs: [[650,188,'RIFT 2: SHORT ECHO'],[980,188,'CHAIN OR FALL'],[2260,188,'ECHO → HIGH CACHE']],
    props: [[120,188,'arch'],[520,188,'spire'],[1170,188,'arch'],[1860,188,'spire'],[2600,188,'arch'],[3090,188,'spire']],
    coins: [[170,184],[245,150],[455,106],[620,184],[690,86],[735,86],[930,184],[1010,136],[1130,190],[1270,184],[1360,116],[1510,184],[1730,78],[1900,184],[2045,122],[2170,184],[2350,92],[2428,126],[2570,184],[2780,76],[2845,76],[3028,92],[3160,184]],
    enemies: [[560,188,90],[1280,188,100],[1940,188,120],[2580,188,100],[3070,188,85]],
    phaseShards: [[820,154],[860,154],[1125,170],[1515,154],[2170,156],[2420,126],[2460,126]],
    secret: [[2820,84,170,18,false,0]],
    secretShards: [[2860,56],[2910,46],[2960,56]],
    flag: 3220,
    riftTime: 5.5,
    echoTime: 1.25
  }];
  let L, p, particles, floaters;
  const colors = { dirt:'#a45a2a', grass:'#28c840', shadow:'#5d3219', shard:'#9dfcff', sky:'#77cdfd', tile:'#d9893c', tileDark:'#8d4b22' };
  const arrRect = a => ({ x:+a[0]||0, y:+a[1]||0, w:+a[2]||0, h:+a[3]||0, on:!!a[4], t:+a[5]||0, grace:!!a[7] });
  const objRect = r => ({ x:+r.x||0, y:+r.y||0, w:+r.w||0, h:+r.h||0, on:!!r.on, t:+r.t||0, grace:!!r.grace });
  function normalizeLevel(level){
    level.hidden = (level.hidden||[]).map(h => Array.isArray(h) ? arrRect(h) : objRect(h));
    level.secret = (level.secret||[]).map(h => Array.isArray(h) ? arrRect(h) : objRect(h));
    return level;
  }

  
  function cloneLevel(level){ return JSON.parse(JSON.stringify(level)); }
  function reset(full=false){
    boostToken++;
    L = normalizeLevel(cloneLevel(levels[Math.max(0, Math.min(levels.length-1, levelNo-1))])); riftTime=L.riftTime||7.5; echoTime=L.echoTime||2.2; cam = 0; particles = []; floaters = [];
    const oldLives = p ? p.lives : 3, oldCoins = p ? p.coins : 0;
    p = {x:52,y:150,w:20,h:28,vx:0,vy:0,on:false,wasOn:false,face:1,lives: full?3:oldLives,coins: full?0:oldCoins,big:false,dead:0,win:false,coyote:0,jumpBuffer:0,jumpWasDown:false,runT:0,phase:0,phaseMemory:0,combo:1,secret:false,msgT:0};
    if (full){ const panel=ui.overlay.querySelector('#panel'); panel.innerHTML = initialPanel; panel.style.boxShadow=''; }
    message=''; updateHud();
  }
  function applyDirPointers(){
    let left=false, right=false;
    for(const d of dirPointers.values()){ if(d==='left') left=true; if(d==='right') right=true; }
    setKey('left',left); setKey('right',right);
  }
  function directionFromPoint(x){
    const leftBtn=document.querySelector('[data-k=\"left\"]'), rightBtn=document.querySelector('[data-k=\"right\"]');
    const lb=leftBtn && leftBtn.getBoundingClientRect(), rb=rightBtn && rightBtn.getBoundingClientRect();
    if(lb && rb){ const mid=(lb.right+rb.left)/2; return x < mid ? 'left' : 'right'; }
    const vv=window.visualViewport; const offset=vv?vv.offsetLeft:0, width=vv&&vv.width?vv.width:innerWidth;
    return x < offset + width/2 ? 'left' : 'right';
  }
  function resize(){
    const dpr = Math.min(devicePixelRatio || 1, 3);
    const vv = window.visualViewport;
    const rawW = vv && vv.width ? vv.width : innerWidth, rawH = vv && vv.height ? vv.height : innerHeight;
    const vw = Math.max(280, Number.isFinite(rawW) ? rawW : innerWidth);
    const vh = Math.max(320, Number.isFinite(rawH) ? rawH : innerHeight);
    const portrait = vh > vw;
    const cssW = vw;
    const top = portrait ? Math.max(36, (vv ? vv.offsetTop : 0) + 36) : 0;
    const dock = portrait ? 118 : 0;
    const cssH = portrait ? Math.max(330, vh - top - dock) : vh;
    canvas.style.width = Math.round(cssW) + 'px';
    canvas.style.height = Math.round(cssH) + 'px';
    W = portrait ? 360 : BASE_W;
    const scale = cssW / W;
    VH = Math.max(H, Math.round(cssH / scale));
    yOff = portrait ? Math.min(112, Math.max(70, Math.round(VH*.2))) : 0;
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(scale*dpr,0,0,scale*dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  addEventListener('resize', resize); if(window.visualViewport){ window.visualViewport.addEventListener('resize', resize); window.visualViewport.addEventListener('scroll', resize); } resize(); reset(true);
  function updateHud(){ ui.score.textContent = 'Shards ' + p.coins; ui.lives.textContent = 'Lives ' + p.lives; ui.status.textContent = message || (p.phase>0 ? 'Phase x'+(p.combo||1) : (p.phaseMemory>0 ? 'Phase echo' : 'Rift '+levelNo)); }
  function hit(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
  function solidAt(r){
    const platform = L.platforms.find(([x,y,w,h]) => hit(r,{x,y,w,h}));
    if (platform) return platform;
    const hidden = (L.hidden||[]).find(h => h.on && hit(r,h));
    if (hidden) return [hidden.x,hidden.y,hidden.w,hidden.h];
    const secret = (L.secret||[]).find(h => h.on && hit(r,h));
    if (secret) return [secret.x,secret.y,secret.w,secret.h];
    const gate = (L.gates||[]).find(([x,y,w,h]) => p && p.phase<=0 && hit(r,{x,y,w,h}));
    if (gate){ message='Need phase charge'; if(p) p.msgT=.9; updateHud(); return gate; }
    const block = L.blocks.find(b => hit(r,{x:b[0],y:b[1],w:b[2],h:b[3]}));
    return block && [block[0],block[1],block[2],block[3],block[4],block];
  }
  function puff(x,y,c='#fff',n=12,power=85){ for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-.5)*power,vy:(Math.random()-.9)*power,t:.55,c}); }
  function floater(x,y,text,c='#fff'){ floaters.push({x,y,text,c,t:.75}); }
  function tone(freq=440,dur=.08,type='square',gain=.045){ if(!audioCtx) return; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type; o.frequency.value=freq; g.gain.setValueAtTime(gain,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur); }
  function sfx(name){ const map={jump:[520,.08,'square'],coin:[880,.07,'triangle'],block:[220,.08,'sawtooth'],stomp:[150,.10,'square'],hurt:[90,.18,'sawtooth'],power:[660,.16,'triangle'],win:[980,.22,'triangle'],land:[110,.04,'square']}; const a=map[name]; if(a) tone(a[0],a[1],a[2]); }
  function die(){ if (p.dead) return; p.lives--; p.dead=.8; shake=.35; hitPause=.08; sfx('hurt'); puff(p.x+p.w/2,p.y+p.h/2,'#ff725c',18,135); if(p.lives<1){ running=false; message='Game over'; updateHud(); ui.overlay.style.display='grid'; ui.overlay.querySelector('#panel').innerHTML = '<h1>Game Over</h1><p>The rift collapsed. Final charge: <b>'+p.coins+'</b> shards.</p><button id="start">Try again</button>'; bindStart(); } else setTimeout(()=>reset(false),700); updateHud(); }
  function win(){
    running=false; p.win=true; message='Portal cleared!'; sfx('win');
    shake=p.secret ? .75 : .45; secretFlash=p.secret ? 1.2 : .35;
    puff(p.x,p.y,p.secret?'#ff6bff':'#fff28a',p.secret?70:40,p.secret?260:210);
    floater(p.x+20,p.y-10,p.secret?'SECRET RIFT SEALED':'RIFT SEALED',p.secret?'#ff6bff':'#fff28a'); updateHud();
    const secret=p.secret, score=p.coins;
    setTimeout(()=>{
      ui.overlay.style.display='grid';
      const next = levelNo < 2;
      ui.overlay.querySelector('#panel').innerHTML = `<h1>${secret ? 'Secret Rift Sealed' : 'Rift Sealed'}</h1><p>Phase shards chained: <b>${score}</b>. ${secret ? 'You found the high-route cache.' : 'The gate folds shut behind you.'}</p><button id="start" data-next="${next?'1':'0'}">${next?'Enter Rift 2':'Run again'}</button>`;
      if(secret) ui.overlay.querySelector('#panel').style.boxShadow='0 0 0 2px rgba(255,107,255,.5), 0 0 80px rgba(255,107,255,.45), 0 20px 80px rgba(0,0,0,.35)';
      bindStart();
    }, secret ? 850 : 450);
  }
  function step(dt){
    if(!running) return;
    dt = Math.min(dt, .033);
    if(hitPause>0){ hitPause-=dt; return; }
    const left=keys.left||keys.ArrowLeft, right=keys.right||keys.ArrowRight, run=mobileSprint||keys.run||keys.Shift, jump=keys.jump||keys.Space||keys.ArrowUp;
    if(jump && !p.jumpWasDown) p.jumpBuffer = .11;
    if(!jump && p.jumpWasDown && p.vy < -95) p.vy *= .48;
    p.jumpWasDown = !!jump;
    p.jumpBuffer = Math.max(0, p.jumpBuffer-dt);
    p.coyote = p.on ? .105 : Math.max(0, p.coyote-dt);
    const accel = run ? 1180 : 820, max = run ? 205 : 142, brake = p.on ? .00018 : .025;
    if(left) { p.vx -= accel*dt; p.face=-1; } if(right){ p.vx += accel*dt; p.face=1; }
    if(!left && !right) p.vx *= Math.pow(brake, dt);
    p.vx = Math.max(-max, Math.min(max, p.vx));
    if(p.jumpBuffer>0 && p.coyote>0){ p.vy = p.big ? -355 : -322; p.on=false; p.coyote=0; p.jumpBuffer=0; sfx('jump'); puff(p.x+p.w/2,p.y+p.h,'#dff7ff',14,105); }
    p.vy += 820*dt;
    p.x += p.vx*dt; let s = solidAt(p); if(s){ if(p.vx>0) p.x=s[0]-p.w; else if(p.vx<0) p.x=s[0]+s[2]; p.vx=0; }
    p.wasOn = p.on;
    p.y += p.vy*dt; p.on=false; s = solidAt(p); if(s){ if(p.vy>0){ p.y=s[1]-p.h; p.on=true; if(!p.wasOn && p.vy>160){ sfx('land'); puff(p.x+p.w/2,p.y+p.h,'#eaffff',14,80); } } else { p.y=s[1]+s[3]; bumpBlock(s); } p.vy=0; }
    p.x = Math.max(0, Math.min(L.width-p.w, p.x)); if(p.y>H+80) die();
    for(const c of L.coins){ if(!c[2] && hit(p,{x:c[0]-8,y:c[1]-8,w:16,h:16})){ c[2]=1; const gain=p.combo||1; p.coins+=gain; sfx('coin'); floater(c[0],c[1]-8,(gain>1?'PHASE +':' +')+gain, gain>1?'#9dfcff':'#fff28a'); puff(c[0],c[1],gain>1?'#9dfcff':'#fff28a',12,95); updateHud(); }}

    const release=e=>{ e.preventDefault(); if(activePointer!==null && e.pointerId!==activePointer) return; activePointer=null; el.classList.remove('pressed'); if(k==='left'||k==='right'){ dirPointers.delete(e.pointerId); applyDirPointers(); } else if(k!=='run') setKey(k,false); };
    el.addEventListener('pointermove', e=>{
      if(activePointer===null || (k!=='left' && k!=='right')) return;
      dirPointers.set(e.pointerId,directionFromPoint(e.clientX)); applyDirPointers();
    }, {passive:false});
    ['pointerup','pointercancel','lostpointercapture'].forEach(t=>el.addEventListener(t,release,{passive:false}));
  });
  function bindStart(){
    ui.start = document.getElementById('start');
    if (!ui.start) return;
    ui.start.addEventListener('pointerup', e=>{ e.preventDefault(); startGame(); }, {passive:false});
    ui.start.addEventListener('click', e=>{ e.preventDefault(); if(e.detail===0) startGame(); }, {passive:false});
  }
  function startGame(){ if(starting) return; starting = true; if(!audioCtx){ const AC=window.AudioContext||window.webkitAudioContext; if(AC) audioCtx=new AC(); } if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); const next=ui.start && ui.start.dataset.next==='1'; if(next) levelNo++; else levelNo=1; ui.overlay.style.display='none'; dirPointers.clear(); setKey('left',false); setKey('right',false); mobileSprint=false; const runBtn=document.querySelector('[data-k=\"run\"]'); if(runBtn){ runBtn.classList.remove('active'); runBtn.classList.remove('pressed'); const tag=runBtn.querySelector('small'); if(tag) tag.textContent='SPRINT'; } reset(!next); if(levelNo===2){ message='Rift 2: short echoes'; updateHud(); } running=true; sfx('power'); last=performance.now(); setTimeout(()=>{ starting=false; }, 250); }
  bindStart();
  ui.pause.addEventListener('pointerup', e=>{
    e.preventDefault(); running=false; levelNo=1;
    ui.overlay.style.display='grid';
    ui.overlay.querySelector('#panel').innerHTML='<h1>Retry Rift?</h1><p>Reset the run and start fresh.</p><button id="start">Restart</button>';
    bindStart();
  }, {passive:false});
})();
window.addEventListener('error', e=>{ const t=document.getElementById('toast'); if(t){ t.textContent='Rift Runner hit an error. Tap ↻ to restart.'; t.style.display='block'; } });
</script>
