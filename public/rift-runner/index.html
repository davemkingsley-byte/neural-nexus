 if(p.x>L.goal)win(); for(const q of fx){q.t-=dt;q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=180*dt} fx=fx.filter(q=>q.t>0); for(const t of text){t.t-=dt;t.y-=22*dt} text=text.filter(t=>t.t>0); cam+=(Math.max(0,Math.min(L.width-W,p.x-W*.38+70))-cam)*Math.min(1,dt*7); shake=Math.max(0,shake-dt); flash=Math.max(0,flash-dt)}
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0)}
function draw(){ctx.clearRect(0,0,W,H); const th=L.theme; let g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,th[0]);g.addColorStop(.58,th[1]);g.addColorStop(.59,th[2]);g.addColorStop(1,th[3]);ctx.fillStyle=g;ctx.fillRect(0,0,W,H); if(shake)ctx.translate((Math.random()-.5)*shake*16,(Math.random()-.5)*shake*10); ctx.save();ctx.translate(-Math.round(cam*.25),0); for(let x=-80;x<W+L.width*.25;x+=130){rect(x,58,42,12,'rgba(255,255,255,.75)');rect(x+16,48,35,24,'rgba(255,255,255,.75)');rect(x+44,60,26,10,'rgba(255,255,255,.75)')}ctx.restore(); ctx.save();ctx.translate(-Math.round(cam),0);
 for(const s of L.signs){rect(s[0]-48,s[1]-42,96,24,'#351a68');rect(s[0]-44,s[1]-38,88,16,'#9dfcff');ctx.fillStyle='#082f46';ctx.font='900 9px ui-rounded';ctx.textAlign='center';ctx.fillText(s[2],s[0],s[1]-26)}
 for(const r of L.rifts) if(!r.used){rect(r.x+10,r.y+4,14,30,'#703cff');rect(r.x+4,r.y+12,26,12,'#9dfcff')} for(const b of L.bridges){if(b.t>0){ctx.globalAlpha=.75;rect(b.x,b.y,b.w,b.h,'#70f7ff');rect(b.x,b.y-6,Math.max(3,b.w*(b.t/(levelIndex?5.4:7.2))),4,b.t<1.6?'#ff4dff':'#062b42');ctx.globalAlpha=1}else{ctx.globalAlpha=.22; for(let x=b.x;x<b.x+b.w;x+=18)rect(x,b.y+8,10,3,'#9dfcff');ctx.globalAlpha=1}}

function loop(t){let dt=(t-last)/1000||0;last=t;step(dt);draw();requestAnimationFrame(loop)} requestAnimationFrame(loop);
function setKey(k,v){key[k]=v} addEventListener('keydown',e=>{if(e.code==='ArrowLeft')key.left=1;if(e.code==='ArrowRight')key.right=1;if(e.code==='ArrowUp'||e.code==='Space')key.jump=1;if(e.code==='Shift'){ if(!key.phase&&!e.repeat&&p){p.phase=Math.max(p.phase,.85);p.echo=Math.max(p.echo,.75);p.vx=Math.max(p.vx,245);particle(p.x+8,p.y+16,'#9dfcff',18,170);beep(760,.09,'triangle')} key.phase=1 }}); addEventListener('keyup',e=>{if(e.code==='ArrowLeft')key.left=0;if(e.code==='ArrowRight')key.right=0;if(e.code==='ArrowUp'||e.code==='Space')key.jump=0;if(e.code==='Shift')key.phase=0});
function dirFrom(x){const l=document.querySelector('[data-k=left]').getBoundingClientRect(),r=document.querySelector('[data-k=right]').getBoundingClientRect();return x<(l.right+r.left)/2?'left':'right'} function applyDirs(){let l=0,r=0;for(const d of ptrs.values()){if(d==='left')l=1;if(d==='right')r=1}key.left=l;key.right=r} function clearDirs(){ptrs.clear();key.left=key.right=key.jump=key.phase=0;document.querySelectorAll('.pressed,.on').forEach(b=>{b.classList.remove('pressed');b.classList.remove('on')})}
document.querySelectorAll('[data-k]').forEach(b=>{let id=null;const k=b.dataset.k;b.addEventListener('pointerdown',e=>{e.preventDefault();id=e.pointerId;b.setPointerCapture&&b.setPointerCapture(id);b.classList.add('pressed'); if(k==='phase'){key.phase=1;p.phase=Math.max(p.phase,.85);p.echo=Math.max(p.echo,.75);p.vx=Math.max(p.vx,245);particle(p.x+8,p.y+16,'#9dfcff',18,170);beep(760,.09,'triangle');b.classList.add('on')} else if(k==='jump')key.jump=1; else{ptrs.set(id,k);applyDirs()}},{passive:false});b.addEventListener('pointermove',e=>{if(id!==e.pointerId)return;if(k==='left'||k==='right'){ptrs.set(id,dirFrom(e.clientX));applyDirs()}},{passive:false});const up=e=>{if(id!==null&&e.pointerId!==id)return;b.classList.remove('pressed'); if(k==='phase'){key.phase=0;b.classList.remove('on')} else if(k==='jump')key.jump=0; else{ptrs.delete(e.pointerId);applyDirs()} id=null};['pointerup','pointercancel','lostpointercapture'].forEach(ev=>b.addEventListener(ev,up,{passive:false}))}); addEventListener('blur',clearDirs);document.addEventListener('visibilitychange',()=>{if(document.hidden)clearDirs()});
function bindStart(){ui.start=document.getElementById('start');if(!ui.start)return;ui.start.addEventListener('pointerup',e=>{e.preventDefault();startGame()},{passive:false});ui.start.addEventListener('click',e=>{e.preventDefault();if(e.detail===0)startGame()},{passive:false})}
function startGame(){if(!audio){const A=AudioContext||webkitAudioContext;if(A)audio=new A()} if(audio&&audio.state==='suspended')audio.resume(); const next=ui.start&&ui.start.dataset.next==='1'; levelIndex=next?Math.min(levelIndex+1,levels.length-1):0; ui.overlay.style.display='none'; clearDirs(); reset(!next); if(levelIndex) label(180,150,'RIFT 2: SHORT ECHO','#9dfcff'); run=true; last=performance.now(); beep(660,.12,'triangle')}
bindStart(); ui.retry.addEventListener('pointerup',e=>{e.preventDefault();run=false;levelIndex=0;showPanel('Retry Rift?','Reset the run and start fresh.','Restart')},{passive:false}); window.addEventListener('error',()=>{ui.toast.textContent='Rift Runner hit an error. Tap ↻ to restart.';ui.toast.style.display='block'});
})();
