<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#6ec6ff" />
  <title>Rift Runner — Neural NeXus</title>
  <style>
    :root { color-scheme: dark; --safe-bottom: env(safe-area-inset-bottom, 0px); }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
    html, body { margin:0; height:100%; overflow:hidden; background:#061521; font-family: ui-rounded, system-ui, -apple-system, Segoe UI, sans-serif; }
    #wrap { position:fixed; inset:0; display:grid; place-items:center; background:linear-gradient(#6ec6ff 0%, #a8e7ff 48%, #274262 49%, #061521 100%); }
    canvas { width:100vw; height:100dvh; display:block; image-rendering: pixelated; }
    .hud { position:fixed; inset: max(12px, env(safe-area-inset-top)) 12px auto 12px; display:flex; justify-content:space-between; gap:10px; color:white; font-weight:900; text-shadow:0 2px 0 #123, 0 0 8px #123; pointer-events:none; letter-spacing:.03em; }
    .pill { background:rgba(3,18,32,.35); border:1px solid rgba(255,255,255,.22); border-radius:999px; padding:8px 12px; backdrop-filter: blur(8px); }
    #overlay { position:fixed; inset:0; display:grid; place-items:center; padding:22px; background:radial-gradient(circle at 50% 35%, rgba(255,255,255,.25), rgba(3,12,24,.78)); color:white; text-align:center; }
    #panel { max-width:520px; background:rgba(4,18,35,.72); border:1px solid rgba(255,255,255,.22); border-radius:28px; padding:24px; box-shadow:0 20px 80px rgba(0,0,0,.35); backdrop-filter: blur(14px); }
    h1 { margin:.1rem 0 .3rem; font-size:clamp(2rem, 10vw, 4rem); line-height:.9; }
    p { margin:.7rem 0; color:#dbefff; font-size:1rem; }
    button { appearance:none; border:0; border-radius:999px; padding:14px 22px; margin-top:12px; font:900 1.05rem ui-rounded, system-ui; color:#05223b; background:linear-gradient(#ffe86c,#ffb22e); box-shadow:0 6px 0 #9b5512, 0 12px 30px rgba(0,0,0,.3); }
    button:active { transform:translateY(4px); box-shadow:0 2px 0 #9b5512; }
    .controls { position:fixed; left:0; right:0; bottom:calc(12px + var(--safe-bottom)); display:flex; justify-content:space-between; padding:0 18px; pointer-events:none; }
    .cluster { display:flex; gap:12px; pointer-events:auto; }
    .ctrl { width:66px; height:66px; border-radius:50%; border:2px solid rgba(255,255,255,.33); background:rgba(5,22,40,.42); color:white; font-size:28px; font-weight:1000; display:grid; place-items:center; user-select:none; box-shadow:inset 0 2px 8px rgba(255,255,255,.12), 0 8px 24px rgba(0,0,0,.22); backdrop-filter: blur(8px); }
    .ctrl.big { width:78px; height:78px; background:rgba(255,180,38,.55); }
    .ctrl.down { transform:translateY(10px); }
    .ctrl.active { background:rgba(157,252,255,.7); color:#05223b; box-shadow:0 0 0 4px rgba(157,252,255,.22), 0 10px 28px rgba(0,0,0,.25); }
    @media (min-width: 900px) { .ctrl { opacity:.45 } }
    @media (orientation: portrait) {
      #wrap { align-items:start; padding-top:max(50px, env(safe-area-inset-top)); }
      canvas { width:100vw; height:min(64dvh, 560px); border-radius:0 0 22px 22px; box-shadow:0 18px 70px rgba(0,0,0,.28); }
      .controls { bottom:calc(8px + var(--safe-bottom)); padding:0 14px; }
      .ctrl { width:74px; height:74px; background:rgba(5,22,40,.62); }
      .ctrl.big { width:88px; height:88px; }
      .cluster { gap:10px; }
    }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="game" aria-label="Rift Runner platform game"></canvas></div>
  <div class="hud"><div class="pill" id="score">Coins 0</div><div class="pill" id="status">Rift 1</div><div class="pill" id="lives">Lives 3</div></div>
  <div class="controls" aria-hidden="true">
    <div class="cluster"><div class="ctrl" data-k="left">◀</div><div class="ctrl" data-k="right">▶</div></div>
    <div class="cluster"><div class="ctrl down" data-k="run">⚡</div><div class="ctrl big" data-k="jump">↑</div></div>
  </div>
  <div id="overlay"><div id="panel"><h1>Rift Runner</h1><p>A bright 16-bit adventure: sprint, jump, crack crystal caches, dodge goblins, gather shards, and reach the rift gate.</p><p><b>Controls:</b> touch buttons, or keyboard arrows + space.</p><button id="start">Play</button></div></div>
<script>
(() => {
  const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
  const ui = { score: document.getElementById('score'), lives: document.getElementById('lives'), status: document.getElementById('status'), overlay: document.getElementById('overlay'), start: document.getElementById('start') };
  const BASE_W = 432, H = 243, keys = Object.create(null);
  let W = BASE_W, mobileSprint = false;
  const initialPanel = document.getElementById('panel').innerHTML;
  let last = 0, cam = 0, running = false, starting = false, message = '', boostToken = 0, shake = 0, hitPause = 0, audioCtx = null;
  const levels = [{
    width: 2550,
    platforms: [[0,220,470,40],[540,220,390,40],[1000,220,360,40],[1430,220,410,40],[1910,220,640,40],[310,176,120,18],[650,166,145,18],[850,138,90,18],[1120,172,130,18],[1510,150,150,18],[1710,122,95,18],[2070,166,150,18]],
    blocks: [[330,144,28,28,'coin'],[362,144,28,28,'coin'],[690,134,28,28,'boost'],[1160,140,28,28,'coin'],[1192,140,28,28,'coin'],[1740,90,28,28,'boost'],[2120,134,28,28,'coin']],
    rifts: [[1280,188,34,32],[1845,188,34,32]],
    hidden: [[1350,172,100,18,false],[1870,148,120,18,false]],
    props: [[250,188,'spire'],[970,188,'spire'],[1580,188,'arch'],[2240,188,'spire']],
    coins: [[180,184],[250,184],[342,118],[374,118],[590,184],[704,108],[820,112],[890,108],[1130,142],[1210,112],[1528,122],[1588,122],[1720,92],[1940,184],[2090,136],[2180,136],[2370,184]],
    enemies: [[760,188,80],[1240,188,70],[1660,188,95],[2200,188,120]],
    flag: 2440
  }];
  let L, p, particles, floaters;
  const colors = { dirt:'#a45a2a', grass:'#28c840', shadow:'#5d3219', coin:'#ffd84a', sky:'#77cdfd', tile:'#d9893c', tileDark:'#8d4b22' };
  
  function cloneLevel(level){ return JSON.parse(JSON.stringify(level)); }
  function reset(full=false){
    boostToken++;
    L = cloneLevel(levels[0]); cam = 0; particles = []; floaters = [];
    const oldLives = p ? p.lives : 3, oldCoins = p ? p.coins : 0;
    p = {x:52,y:150,w:20,h:28,vx:0,vy:0,on:false,wasOn:false,face:1,lives: full?3:oldLives,coins: full?0:oldCoins,big:false,dead:0,win:false,coyote:0,jumpBuffer:0,jumpWasDown:false,runT:0};
    if (full) ui.overlay.querySelector('#panel').innerHTML = initialPanel;
    message=''; updateHud();
  }
  function resize(){
    const dpr = Math.min(devicePixelRatio || 1, 3);
    const portrait = innerHeight > innerWidth;
    const cssW = innerWidth;
    const cssH = portrait ? Math.min(innerHeight * .64, 560) : innerHeight;
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    const scale = canvas.height / H;
    W = Math.max(170, Math.round(canvas.width / scale));
    ctx.setTransform(scale,0,0,scale,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  addEventListener('resize', resize); resize(); reset(true);
  function updateHud(){ ui.score.textContent = 'Coins ' + p.coins; ui.lives.textContent = 'Lives ' + p.lives; ui.status.textContent = message || 'Rift 1'; }
  function hit(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
  function solidAt(r){
    const platform = L.platforms.find(([x,y,w,h]) => hit(r,{x,y,w,h}));
    if (platform) return platform;
    const hidden = (L.hidden||[]).find(([x,y,w,h,on]) => on && hit(r,{x,y,w,h}));
    if (hidden) return hidden;
    const block = L.blocks.find(b => hit(r,{x:b[0],y:b[1],w:b[2],h:b[3]}));
    return block && [block[0],block[1],block[2],block[3],block[4],block];
  }
  function puff(x,y,c='#fff',n=12,power=85){ for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-.5)*power,vy:(Math.random()-.9)*power,t:.55,c}); }
  function floater(x,y,text,c='#fff'){ floaters.push({x,y,text,c,t:.75}); }
  function tone(freq=440,dur=.08,type='square',gain=.045){ if(!audioCtx) return; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=type; o.frequency.value=freq; g.gain.setValueAtTime(gain,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur); }
  function sfx(name){ const map={jump:[520,.08,'square'],coin:[880,.07,'triangle'],block:[220,.08,'sawtooth'],stomp:[150,.10,'square'],hurt:[90,.18,'sawtooth'],power:[660,.16,'triangle'],win:[980,.22,'triangle'],land:[110,.04,'square']}; const a=map[name]; if(a) tone(a[0],a[1],a[2]); }
  function die(){ if (p.dead) return; p.lives--; p.dead=.8; shake=.35; hitPause=.08; sfx('hurt'); puff(p.x+p.w/2,p.y+p.h/2,'#ff725c',18,135); if(p.lives<1){ running=false; message='Game over'; updateHud(); ui.overlay.style.display='grid'; ui.overlay.querySelector('#panel').innerHTML = '<h1>Game Over</h1><p>The rift collapsed. Final haul: <b>'+p.coins+'</b> coins.</p><button id="start">Try again</button>'; bindStart(); } else setTimeout(()=>reset(false),700); updateHud(); }
  function win(){ running=false; p.win=true; message='Portal cleared!'; sfx('win'); updateHud(); ui.overlay.style.display='grid'; ui.overlay.querySelector('#panel').innerHTML = `<h1>Rift Sealed</h1><p>You cleared the rift with <b>${p.coins}</b> coins. Want another run?</p><button id="start">Play again</button>`; bindStart(); }
  function step(dt){
    if(!running) return;
    dt = Math.min(dt, .033);
    if(hitPause>0){ hitPause-=dt; return; }
    const left=keys.left||keys.ArrowLeft, right=keys.right||keys.ArrowRight, run=mobileSprint||keys.run||keys.Shift, jump=keys.jump||keys.Space||keys.ArrowUp;
    if(jump && !p.jumpWasDown) p.jumpBuffer = .11;
    if(!jump && p.jumpWasDown && p.vy < -95) p.vy *= .48;
    p.jumpWasDown = !!jump;
    p.jumpBuffer = Math.max(0, p.jumpBuffer-dt);
    p.coyote = p.on ? .105 : Math.max(0, p.coyote-dt);
    const accel = run ? 1180 : 820, max = run ? 205 : 142, brake = p.on ? .00018 : .025;
    if(left) { p.vx -= accel*dt; p.face=-1; } if(right){ p.vx += accel*dt; p.face=1; }
    if(!left && !right) p.vx *= Math.pow(brake, dt);
    p.vx = Math.max(-max, Math.min(max, p.vx));
    if(p.jumpBuffer>0 && p.coyote>0){ p.vy = p.big ? -355 : -322; p.on=false; p.coyote=0; p.jumpBuffer=0; sfx('jump'); puff(p.x+p.w/2,p.y+p.h,'#dff7ff',14,105); }
    p.vy += 820*dt;
    p.x += p.vx*dt; let s = solidAt(p); if(s){ if(p.vx>0) p.x=s[0]-p.w; else if(p.vx<0) p.x=s[0]+s[2]; p.vx=0; }
    p.wasOn = p.on;
    p.y += p.vy*dt; p.on=false; s = solidAt(p); if(s){ if(p.vy>0){ p.y=s[1]-p.h; p.on=true; if(!p.wasOn && p.vy>160){ sfx('land'); puff(p.x+p.w/2,p.y+p.h,'#eaffff',8,55); } } else { p.y=s[1]+s[3]; bumpBlock(s); } p.vy=0; }
    p.x = Math.max(0, Math.min(L.width-p.w, p.x)); if(p.y>H+80) die();
    for(const c of L.coins){ if(!c[2] && hit(p,{x:c[0]-8,y:c[1]-8,w:16,h:16})){ c[2]=1; p.coins++; sfx('coin'); floater(c[0],c[1]-8,'+1','#fff28a'); puff(c[0],c[1],colors.coin,10,80); updateHud(); }}
    for(const e of L.enemies){ if(e.dead) continue; if(e.x == null) e.x = e[0]; if(e.dir == null) e.dir = 1; e.walk=(e.walk||0)+dt*8; e.x += e.dir*38*dt; if(Math.abs(e.x-e[0])>e[2]) e.dir*=-1; const er={x:e.x,y:e[1],w:24,h:24}; if(hit(p,er)){ if(p.vy>70 && p.y+p.h-8<er.y+8){ e.dead=1; p.vy=-235; p.coins+=2; sfx('stomp'); hitPause=.045; shake=.12; floater(er.x+12,er.y,'+2','#9cff6a'); puff(er.x+12,er.y+12,'#9cff6a',18,125); updateHud(); } else die(); }}
    if(p.x > L.flag) win();
    for(const r of (L.rifts||[])){ if(hit(p,{x:r[0],y:r[1],w:r[2],h:r[3]})){ r[3]=0; revealRift(); sfx('power'); floater(p.x+12,p.y-8,'PHASE','#9dfcff'); puff(p.x+10,p.y+10,'#9dfcff',24,160); shake=.18; }}
    for(const b of L.blocks) if(b.bump) b.bump=Math.max(0,b.bump-dt);
    particles = particles.filter(q => (q.t-=dt)>0).map(q => (q.x+=q.vx*dt, q.y+=q.vy*dt, q.vy+=180*dt, q));
    floaters = floaters.filter(f => (f.t-=dt)>0).map(f => (f.y-=22*dt, f));
    shake=Math.max(0,shake-dt);
    const look = p.face>0 ? 76 : 34;
    cam += (Math.max(0, Math.min(L.width-W, p.x - W*.42 + look)) - cam) * Math.min(1, dt*7.5);
  }
  function bumpBlock(s){
    const b = s && s[5];
    if(!b || b.hit) return;
    b.hit=1; b.bump=.18; p.coins += b[4]==='coin'?3:0;
    if(b[4]==='boost') {
      const token = ++boostToken; p.big=true; p.h=34; message='Power jump!'; sfx('power'); floater(b[0]+14,b[1]-8,'RIFT BOOST','#9dfcff');
      setTimeout(()=>{ if(p && token===boostToken){p.big=false;p.h=28;message='';updateHud();}},7000);
    }
    else { sfx('block'); floater(b[0]+14,b[1]-8,'+3','#9dfcff'); }
    puff(b[0]+14,b[1],'#9dfcff',16,120); shake=.08; updateHud();
  }
  function revealRift(){
    for(const h of (L.hidden||[])) h[4]=true;
    message='Rift paths revealed'; updateHud();
    setTimeout(()=>{ if(L && L.hidden){ for(const h of L.hidden) h[4]=false; message=''; updateHud(); } }, 6500);
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    if(shake>0){ ctx.save(); ctx.translate((Math.random()-.5)*shake*18,(Math.random()-.5)*shake*12); }
    drawSky();
    ctx.save(); ctx.translate(-cam*.18,0); drawFarHills(); ctx.restore();
    ctx.save(); ctx.translate(-cam*.42,0); drawNearHills(); ctx.restore();
    ctx.save(); ctx.translate(-cam,0);
    drawProps();
    for(const [x,y,w,h] of L.platforms) drawGround(x,y,w,h);
    for(const h of (L.hidden||[])) if(h[4]) drawPhasePlatform(h[0],h[1],h[2],h[3]);
    for(const b of L.blocks) drawQuestionBlock(b);
    for(const r of (L.rifts||[])) if(r[3]>0) drawShard(r[0],r[1]);
    for(const c of L.coins) if(!c[2]) drawCoin(c[0],c[1]);
    for(const e of L.enemies) if(!e.dead) drawCritter(e.x == null ? e[0] : e.x,e[1]);
    drawGate(L.flag,126);
    drawHero(p.x,p.y,p.face,p.big);
    for(const q of particles){ ctx.globalAlpha=Math.max(0,q.t/.55); ctx.fillStyle=q.c; ctx.fillRect(q.x|0,q.y|0,4,4); ctx.globalAlpha=1; }
    for(const f of floaters){ ctx.globalAlpha=Math.max(0,f.t/.75); ctx.fillStyle=f.c; ctx.font='900 10px ui-rounded, system-ui'; ctx.textAlign='center'; ctx.fillText(f.text,f.x,f.y); ctx.globalAlpha=1; }
    ctx.restore();
    if(shake>0) ctx.restore();
  }
  function drawSky(){
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#61c7ff'); g.addColorStop(.58,'#b7f1ff'); g.addColorStop(.59,'#67d868'); g.addColorStop(1,'#167034'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,.92)';
    for(let x=20; x<W+120; x+=145) cloud(x+(performance.now()/90%145),42+(x%4)*9);
  }
  function drawFarHills(){
    for(let x=-220; x<L.width*.18+W+220; x+=210){
      ctx.fillStyle='#4fc56b'; ctx.beginPath(); ctx.arc(x,221,118,Math.PI,0); ctx.fill();
      ctx.fillStyle='#76dc82'; ctx.beginPath(); ctx.arc(x+40,221,78,Math.PI,0); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.25)'; ctx.beginPath(); ctx.arc(x-44,142,12,0,7); ctx.arc(x+6,128,10,0,7); ctx.fill();
    }
  }
  function drawNearHills(){
    for(let x=-160; x<L.width*.42+W+160; x+=260){
      ctx.fillStyle='#25a858'; ctx.beginPath(); ctx.arc(x,222,70,Math.PI,0); ctx.fill();
      ctx.fillStyle='#38bd64'; ctx.fillRect(x-54,182,108,40);
      ctx.fillStyle='#167034'; for(let i=-44;i<52;i+=22) ctx.fillRect(x+i,194,10,18);
    }
  }
  function drawGround(x,y,w,h){
    ctx.fillStyle='#25bc3f'; ctx.fillRect(x,y,w,9);
    ctx.fillStyle='#80e35f'; ctx.fillRect(x,y,w,3);
    for(let tx=x; tx<x+w; tx+=16){
      for(let ty=y+9; ty<y+h; ty+=16){
        ctx.fillStyle=((tx+ty)/16)%2<1 ? colors.tile : '#c87534'; ctx.fillRect(tx,ty,16,16);
        ctx.fillStyle=colors.tileDark; ctx.fillRect(tx,ty,16,2); ctx.fillRect(tx,ty,2,16);
      }
    }
  }
  function drawPhasePlatform(x,y,w,h){
    ctx.globalAlpha=.78+Math.sin(performance.now()/120)*.18; ctx.fillStyle='#76f4ff'; ctx.fillRect(x,y,w,h); ctx.fillStyle='#b9fbff'; ctx.fillRect(x,y,w,3); ctx.globalAlpha=1;
  }
  function drawShard(x,y){
    const t=performance.now()/160; ctx.save(); ctx.translate(x+17,y+14); ctx.rotate(t/4); ctx.fillStyle='#9dfcff'; ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(12,0); ctx.lineTo(0,16); ctx.lineTo(-12,0); ctx.closePath(); ctx.fill(); ctx.strokeStyle='#7d4cff'; ctx.lineWidth=3; ctx.stroke(); ctx.restore();
  }
  function drawQuestionBlock(b){
    const x=b[0], y=b[1] - Math.sin((b.bump||0)*18)*6, w=b[2], h=b[3];
    ctx.fillStyle=b.hit?'#594a71':'#5dd6ff'; ctx.fillRect(x,y,w,h);
    ctx.fillStyle=b.hit?'#3b3151':'#2368d5'; ctx.fillRect(x,y+h-5,w,5); ctx.fillRect(x+w-5,y,5,h);
    ctx.fillStyle=b.hit?'#8e7caf':'#d7fbff'; ctx.fillRect(x+4,y+4,w-8,4); ctx.fillRect(x+4,y+4,4,h-8);
    if(!b.hit){ ctx.fillStyle='#823ee8'; ctx.beginPath(); ctx.moveTo(x+14,y+5); ctx.lineTo(x+23,y+14); ctx.lineTo(x+14,y+23); ctx.lineTo(x+5,y+14); ctx.closePath(); ctx.fill(); ctx.fillStyle='#effcff'; ctx.fillRect(x+13,y+9,2,10); }
  }
  function drawCoin(x,y){
    y += Math.sin(performance.now()/180+x)*2;
    const wob=6+Math.sin(performance.now()/120+x)*2;
    ctx.fillStyle='#fff28a'; ctx.beginPath(); ctx.ellipse(x,y,wob,10,0,0,7); ctx.fill();
    ctx.fillStyle='#e4a51d'; ctx.fillRect(x-1,y-7,2,14);
  }
  function drawCritter(x,y){
    const bob=Math.sin((performance.now()/120)+(x||0))*2; y+=bob;
    rounded(x,y+4,24,20,5,'#8a4a2a');
    ctx.fillStyle='#623018'; ctx.fillRect(x+2,y+20,7,4); ctx.fillRect(x+15,y+20,7,4);
    ctx.fillStyle='white'; ctx.fillRect(x+5,y+9,5,5); ctx.fillRect(x+15,y+9,5,5);
    ctx.fillStyle='#201008'; ctx.fillRect(x+7,y+11,2,2); ctx.fillRect(x+17,y+11,2,2);
  }
  function drawProps(){
    if(!L.props) return;
    for(const [x,y,t] of L.props){
      if(t==='spire'){
        ctx.fillStyle='#3147a8'; ctx.fillRect(x+9,y-46,18,46); ctx.fillStyle='#6df0ff'; ctx.fillRect(x+13,y-58,10,18); ctx.fillStyle='#1e2c75'; ctx.fillRect(x+27,y-42,5,42); ctx.fillStyle='#b9fbff'; ctx.fillRect(x+13,y-42,5,36); ctx.fillStyle='#7e4cff'; ctx.fillRect(x+2,y-8,34,8);
      } else {
        ctx.fillStyle='#7a4ad8'; ctx.fillRect(x,y-54,12,54); ctx.fillRect(x+46,y-54,12,54); ctx.fillRect(x,y-54,58,12); ctx.fillStyle='#c6a8ff'; ctx.fillRect(x+8,y-46,42,6);
      }
    }
  }
  function drawGate(x,y){
    ctx.fillStyle='#6538c8'; ctx.fillRect(x,y+10,14,84);
    ctx.strokeStyle='#f2dcff'; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(x+7,y,24,0,7); ctx.stroke();
    ctx.strokeStyle='#9d69ff'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(x+7,y,16,0,7); ctx.stroke();
  }
  function drawHero(x,y,face,big){
    const speed=Math.abs(p.vx||0), h=big?34:28, bob=p.on&&speed>20?Math.sin(performance.now()/55)*2:0;
    x|=0; y=(y+bob)|0;
    // boots and legs
    const stride=p.on?Math.sin(performance.now()/55)*(Math.min(4, speed/45)):0; ctx.fillStyle='#203a9a'; ctx.fillRect(x+4+stride,y+h-9,5,8); ctx.fillRect(x+12-stride,y+h-9,5,8);
    ctx.fillStyle='#3b2418'; ctx.fillRect(x+2,y+h-3,8,4); ctx.fillRect(x+11,y+h-3,8,4);
    // body, cape/scarf, head, cap — original sprite, SNES-like silhouette
    ctx.fillStyle=big?'#ff9f1c':'#19b6c8'; ctx.fillRect(x+3,y+11,15,12);
    ctx.fillStyle='#7d4cff'; ctx.fillRect(x+1,y+13,6,5);
    ctx.fillStyle='#ffe0ac'; ctx.fillRect(x+4,y+5,14,9); ctx.fillRect(x+7,y+2,9,5);
    ctx.fillStyle='#2a1a12'; ctx.fillRect(x+(face>0?14:5),y+8,3,3);
    ctx.fillStyle='#522c8f'; ctx.fillRect(x+4,y+1,14,4); ctx.fillRect(x+8,y-3,8,5);
    ctx.fillStyle='rgba(0,0,0,.2)'; ctx.fillRect(x+2,y+h,18,2);
  }
  function cloud(x,y){ ctx.beginPath(); ctx.arc(x,y,15,0,7); ctx.arc(x+17,y-7,20,0,7); ctx.arc(x+38,y,15,0,7); ctx.fill(); }
  function rounded(x,y,w,h,r,c){ if(c) ctx.fillStyle=c; ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x,y,w,h,r);
    else { ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); }
    ctx.fill();
  }
  function loop(t){ const dt=(t-last)/1000||0; last=t; step(dt); draw(); requestAnimationFrame(loop); } requestAnimationFrame(loop);
  function setKey(k,v){ keys[k]=v; }
  addEventListener('keydown',e=>{ if(['ArrowLeft','ArrowRight','ArrowUp','Space','Shift'].includes(e.code||e.key)) e.preventDefault(); keys[e.code] = keys[e.key] = true; });
  addEventListener('keyup',e=>{ keys[e.code] = keys[e.key] = false; });
  document.querySelectorAll('[data-k]').forEach(el=>{
    const k=el.dataset.k;
    const on=e=>{e.preventDefault(); if(k==='run'){ mobileSprint=!mobileSprint; el.classList.toggle('active',mobileSprint); } else setKey(k,true)};
    const off=e=>{e.preventDefault(); if(k!=='run') setKey(k,false)};
    ['pointerdown','touchstart','mousedown'].forEach(t=>el.addEventListener(t,on,{passive:false}));
    ['pointerup','pointercancel','pointerleave','touchend','touchcancel','mouseup','mouseleave'].forEach(t=>el.addEventListener(t,off,{passive:false}));
  });
  function bindStart(){
    ui.start = document.getElementById('start');
    if (!ui.start) return;
    ['click','pointerup','touchend'].forEach(t=>ui.start.addEventListener(t, e=>{ e.preventDefault(); startGame(); }, {passive:false}));
  }
  function startGame(){ if(starting) return; starting = true; if(!audioCtx){ const AC=window.AudioContext||window.webkitAudioContext; if(AC) audioCtx=new AC(); } if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); ui.overlay.style.display='none'; mobileSprint=false; const runBtn=document.querySelector('[data-k=\"run\"]'); if(runBtn) runBtn.classList.remove('active'); reset(true); running=true; sfx('power'); last=performance.now(); setTimeout(()=>{ starting=false; }, 250); }
  bindStart();
})();
</script>
